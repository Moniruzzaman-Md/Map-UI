<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Supplier Country List – Hotel Map | mynztrip.com</title>
<link rel="stylesheet" href="css/styles.css" />
</head>
<body>
<div class="app-shell">

  <!-- Top bar -->
  <header class="topbar">
    <div class="topbar-brand">
      <svg width="26" height="26" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M12 2L2 8l10 4 10-4-10-6z" fill="#fff"/>
        <path d="M2 16l10 4 10-4M2 12l10 4 10-4" stroke="#fff" stroke-width="1.6" fill="none"/>
      </svg>
      mynztrip.com
    </div>

    <button class="icon-btn" aria-label="Menu">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none"><path d="M4 6h16M4 12h16M4 18h16" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
    </button>

    <button class="icon-btn accent-red" aria-label="Messages">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M21 11.5a8.38 8.38 0 01-.9 3.8 8.5 8.5 0 01-7.6 4.7 8.38 8.38 0 01-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 01-.9-3.8 8.5 8.5 0 014.7-7.6 8.38 8.38 0 013.8-.9h.5a8.48 8.48 0 018 8v.5z" stroke="#fff" stroke-width="1.8" fill="none"/></svg>
    </button>

    <div class="topbar-search">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none"><circle cx="11" cy="11" r="7" stroke="currentColor" stroke-width="2"/><path d="M21 21l-4.35-4.35" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
      <input type="text" placeholder="Booking ID, PNR, Ticket No..." />
      <button type="button">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none"><circle cx="11" cy="11" r="7" stroke="#fff" stroke-width="2"/><path d="M21 21l-4.35-4.35" stroke="#fff" stroke-width="2" stroke-linecap="round"/></svg>
        Search
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none"><path d="M6 9l6 6 6-6" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </button>
    </div>

    <div class="topbar-right">
      <button class="icon-btn" aria-label="Notifications">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none"><path d="M18 8a6 6 0 10-12 0c0 7-3 9-3 9h18s-3-2-3-9z" stroke="#fff" stroke-width="1.8" fill="none"/><path d="M13.7 21a2 2 0 01-3.4 0" stroke="#fff" stroke-width="1.8"/></svg>
      </button>
      <svg class="avatar" width="38" height="38" viewBox="0 0 38 38" xmlns="http://www.w3.org/2000/svg">
        <circle cx="19" cy="19" r="19" fill="#c7cbe8"/>
        <circle cx="19" cy="15" r="6" fill="#7c82b0"/>
        <path d="M6 34c1.5-7 8-10 13-10s11.5 3 13 10" fill="#7c82b0"/>
      </svg>
    </div>
  </header>

  <div class="app-body">

    <!-- Sidebar -->
    <aside class="sidebar">
      <!-- Hotel Map (mother menu for this project's pages) -->
      <nav class="nav-group open">
        <button class="nav-item active">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M9 4L4 6v14l5-2 6 2 5-2V4l-5 2-6-2z" stroke="currentColor" stroke-width="1.6" stroke-linejoin="round"/><path d="M9 4v14M15 6v14" stroke="currentColor" stroke-width="1.6"/></svg>
          Hotel Map
          <svg class="chevron" width="14" height="14" viewBox="0 0 24 24" fill="none"><path d="M6 9l6 6 6-6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </button>
        <div class="submenu">
          <div class="submenu-group open">
            <button class="submenu-item submenu-toggle">
              Country
              <svg class="chevron" width="14" height="14" viewBox="0 0 24 24" fill="none"><path d="M6 9l6 6 6-6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
            </button>
            <div class="submenu-nested">
              <a class="submenu-item nested" href="country-system.html">System</a>
              <a class="submenu-item nested active" href="country-supplier.html">Supplier</a>
            </div>
          </div>
          <div class="submenu-group">
            <button class="submenu-item submenu-toggle">
              City
              <svg class="chevron" width="14" height="14" viewBox="0 0 24 24" fill="none"><path d="M6 9l6 6 6-6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
            </button>
            <div class="submenu-nested">
              <a class="submenu-item nested" href="city-system.html">System</a>
              <a class="submenu-item nested" href="city-supplier.html">Supplier</a>
            </div>
          </div>
          <a class="submenu-item" href="city-mapping.html">City Mapping</a>
          <div class="submenu-group">
            <button class="submenu-item submenu-toggle">
              Hotel
              <svg class="chevron" width="14" height="14" viewBox="0 0 24 24" fill="none"><path d="M6 9l6 6 6-6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
            </button>
            <div class="submenu-nested">
              <a class="submenu-item nested" href="hotel-system.html">System</a>
              <a class="submenu-item nested" href="hotel-supplier.html">Supplier</a>
            </div>
          </div>
        </div>
      </nav>

      <div class="sidebar-footer">
        <button class="reset-demo-btn" id="resetDemoDataBtn">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none"><path d="M3 12a9 9 0 109-9 9 9 0 00-7 3.3" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/><path d="M3 3.5V8h4.5" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg>
          Reset Demo Data
        </button>
      </div>
    </aside>

    <!-- Main content -->
    <main class="main-content">
      <div class="page-header">
        <div class="breadcrumb">Hotel Map <span class="sep">/</span> Country <span class="sep">/</span> Supplier</div>
        <div class="page-title-row">
          <h1 class="page-title">Supplier Country List</h1>
          <button class="info-icon-btn" data-info-target="#supplierCountryInfo" data-info-title="Supplier Country List" aria-label="About this page">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="9" stroke="currentColor" stroke-width="1.6"/><path d="M12 11v5" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/><circle cx="12" cy="8" r="1" fill="currentColor"/></svg>
          </button>
        </div>
      </div>
      <hr class="page-divider" />

      <template id="supplierCountryInfo">
        <p>This page maps each <strong>supplier's own country list</strong> to the system's master country list, so bookings from different suppliers can be matched to the same country record.</p>
        <ul>
          <li><strong>Map</strong> — choose which system country a supplier's country corresponds to. If it's already mapped, an <strong>Unmap</strong> option appears in the same dialog.</li>
          <li><strong>History</strong> — view every mapping made, changed, or removed, by whom and when.</li>
          <li><strong>View Cities</strong> — open this supplier's city list, filtered to this country.</li>
        </ul>
      </template>

      <section class="content-card">
        <div class="card-toolbar">
          <div class="toolbar-controls">
            <div class="toolbar-search">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none"><circle cx="11" cy="11" r="7" stroke="currentColor" stroke-width="2"/><path d="M21 21l-4.35-4.35" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
              <input type="text" id="countrySearch" placeholder="Search by country name..." disabled />
            </div>
            <div class="toolbar-filters">
              <select class="filter-select" id="supplierFilter">
                <option value="">Select Supplier</option>
              </select>
              <select class="filter-select" id="mappedFilter" disabled>
                <option value="all">All</option>
                <option value="mapped">Mapped</option>
                <option value="unmapped">Unmapped</option>
              </select>
            </div>
          </div>
        </div>

        <div class="table-wrap">
          <table class="data-table" id="supplierCountryTable">
            <thead>
              <tr>
                <th style="width:30%">Country Name</th>
                <th style="width:20%">Country ID</th>
                <th style="width:30%">System Country</th>
                <th style="width:20%">Action</th>
              </tr>
            </thead>
            <tbody>
              <tr>
                <td colspan="4" class="empty-state">Select a supplier to view its country list</td>
              </tr>
            </tbody>
          </table>
        </div>

        <div class="table-footer pagination-bar" id="paginationBar"></div>
      </section>
    </main>
  </div>
</div>

<!-- Map Country Modal -->
<div class="modal-overlay" id="mapCountryModal">
  <div class="modal">
    <div class="modal-header">
      <h3>Map Country</h3>
      <button class="modal-close" data-modal-close aria-label="Close">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none"><path d="M6 6l12 12M18 6L6 18" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
      </button>
    </div>
    <div class="modal-body">
      <div class="form-group">
        <label for="mapSupplierName">Supplier</label>
        <input type="text" id="mapSupplierName" disabled />
      </div>
      <div class="form-group">
        <label for="mapSupplierCountryName">Supplier Country</label>
        <input type="text" id="mapSupplierCountryName" disabled />
      </div>
      <div class="form-group">
        <label for="mapSupplierCountryId">Supplier Country ID</label>
        <input type="text" id="mapSupplierCountryId" disabled />
      </div>
      <div class="form-group">
        <label for="systemCountrySelect">System Country</label>
        <select id="systemCountrySelect" class="filter-select" style="width:100%; min-width:0;">
          <option value="">Select system country</option>
        </select>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" id="unmapCountryBtn" style="display:none; margin-right:auto;">Unmap</button>
      <button class="btn btn-secondary" data-modal-close>Cancel</button>
      <button class="btn btn-primary" id="saveMappingBtn">Save Mapping</button>
    </div>
  </div>
</div>

<!-- Confirm Dialog: intentional exception to the sliding-drawer modal
     convention — this is a real centered popup (fade + scale in place),
     since a confirm/warning prompt reads better centered than as a drawer.
     Mirrors the same #confirmModal pattern used in city-mapping.html. -->
<div class="modal-overlay popup-overlay" id="confirmModal">
  <div class="popup-box">
    <div class="modal-header">
      <h3>Please Confirm</h3>
      <button class="modal-close" data-modal-close aria-label="Close">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none"><path d="M6 6l12 12M18 6L6 18" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
      </button>
    </div>
    <div class="modal-body">
      <div id="confirmMessage"></div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" data-modal-close>Cancel</button>
      <button class="btn btn-primary" id="confirmActionBtn">Continue</button>
    </div>
  </div>
</div>

<!-- Mapping History Modal (card design) -->
<div class="modal-overlay" id="historyModal">
  <div class="modal">
    <div class="modal-header">
      <h3>Mapping History <span id="historyCountryName" style="color:var(--text-muted); font-weight:600;"></span></h3>
      <button class="modal-close" data-modal-close aria-label="Close">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none"><path d="M6 6l12 12M18 6L6 18" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
      </button>
    </div>
    <div class="modal-body">
      <div class="history-list" id="historyList"></div>
    </div>
  </div>
</div>

<script src="js/app.js"></script>
<script src="js/data.js"></script>
<script>
  const systemCountrySelect = document.getElementById("systemCountrySelect");
  systemCountrySelect.insertAdjacentHTML(
    "beforeend",
    SYSTEM_COUNTRIES.map((c) => `<option value="${c.name}">${c.name} (${c.code})</option>`).join("")
  );

  const tbody = document.querySelector("#supplierCountryTable tbody");
  const paginationBar = document.getElementById("paginationBar");
  const supplierFilter = document.getElementById("supplierFilter");
  supplierFilter.insertAdjacentHTML(
    "beforeend",
    Object.keys(SUPPLIER_LABELS)
      .map((key) => `<option value="${key}">${SUPPLIER_LABELS[key]}</option>`)
      .join("")
  );
  const mappedFilter = document.getElementById("mappedFilter");
  const countrySearch = document.getElementById("countrySearch");

  let state = { page: 1, pageSize: 10, supplier: "", mapped: "all", query: "" };

  function getFiltered() {
    if (!state.supplier) return [];
    let rows = supplierCountries[state.supplier] || [];
    if (state.mapped === "mapped") rows = rows.filter((r) => r.systemCountry);
    if (state.mapped === "unmapped") rows = rows.filter((r) => !r.systemCountry);
    const q = state.query.trim().toLowerCase();
    if (q) rows = rows.filter((r) => r.name.toLowerCase().includes(q));
    return rows;
  }

  function render() {
    if (!state.supplier) {
      tbody.innerHTML = `<tr><td colspan="4" class="empty-state">Select a supplier to view its country list</td></tr>`;
      paginationBar.innerHTML = "";
      return;
    }

    const filtered = getFiltered();
    const totalPages = Math.max(1, Math.ceil(filtered.length / state.pageSize));
    state.page = Math.min(state.page, totalPages);
    const startIdx = (state.page - 1) * state.pageSize;
    const pageItems = filtered.slice(startIdx, startIdx + state.pageSize);

    tbody.innerHTML = pageItems.length
      ? pageItems
          .map(
            (r) => `
      <tr>
        <td>${r.name}</td>
        <td><span class="code-badge">${r.supplierId}</span></td>
        <td>${
          r.systemCountry
            ? `${r.systemCountry} <span class="code-badge">${SYSTEM_COUNTRY_CODES[r.systemCountry] || "-"}</span>`
            : '<span class="text-not-mapped">Not mapped</span>'
        }</td>
        <td>
          <div class="row-actions">
            <button class="action-btn" data-map-btn data-row-id="${r.id}" aria-label="Map ${r.name}">
              <svg width="15" height="15" viewBox="0 0 24 24" fill="none"><path d="M9 17l-4.5 2V7L9 5m0 12l6 2m-6-2V5m6 14l4.5-2V5L15 7m0 12V7m0 0L9 5" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/></svg>
            </button>
            <button class="action-btn" data-history-btn data-row-id="${r.id}" aria-label="View mapping history for ${r.name}">
              <svg width="15" height="15" viewBox="0 0 24 24" fill="none"><path d="M3 12a9 9 0 109-9 9 9 0 00-7 3.3" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/><path d="M3 3.5V8h4.5" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/><path d="M12 7.5V12l3.2 2" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg>
            </button>
            <a class="action-btn" href="city-supplier.html?supplier=${state.supplier}&country=${r.code}" target="_blank" rel="noopener" aria-label="View cities in ${r.name}">
              <svg width="15" height="15" viewBox="0 0 24 24" fill="none"><path d="M3 21V10l5-3v14M8 21V7l5-4v18M13 21v-9l5 2.5v6.5" stroke="currentColor" stroke-width="1.6" stroke-linejoin="round"/><path d="M3 21h18" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/></svg>
            </a>
          </div>
        </td>
      </tr>`
          )
          .join("")
      : `<tr><td colspan="4" class="empty-state">No countries match this filter</td></tr>`;

    renderPagination(paginationBar, {
      total: filtered.length,
      page: state.page,
      pageSize: state.pageSize,
      onChange: ({ page, pageSize }) => {
        state.page = page;
        state.pageSize = pageSize;
        render();
      },
    });
  }

  supplierFilter.addEventListener("change", () => {
    state.supplier = supplierFilter.value;
    state.page = 1;
    mappedFilter.disabled = !state.supplier;
    countrySearch.disabled = !state.supplier;
    if (!state.supplier) {
      state.query = "";
      countrySearch.value = "";
      mappedFilter.value = "all";
      state.mapped = "all";
    }
    render();
  });

  mappedFilter.addEventListener("change", () => {
    state.mapped = mappedFilter.value;
    state.page = 1;
    render();
  });

  const runSearch = debounce(() => {
    state.query = countrySearch.value;
    state.page = 1;
    render();
  });
  countrySearch.addEventListener("input", runSearch);

  function currentRows() {
    return supplierCountries[state.supplier] || [];
  }

  document.addEventListener("click", (e) => {
    const mapBtn = e.target.closest("[data-map-btn]");
    if (mapBtn) {
      const record = currentRows().find((r) => String(r.id) === mapBtn.dataset.rowId);
      if (!record) return;
      document.getElementById("mapSupplierName").value = SUPPLIER_LABELS[state.supplier] || state.supplier;
      document.getElementById("mapSupplierCountryName").value = record.name;
      document.getElementById("mapSupplierCountryId").value = record.supplierId;
      systemCountrySelect.value = record.systemCountry || "";
      document.getElementById("unmapCountryBtn").style.display = record.systemCountry ? "" : "none";
      const mapModal = document.getElementById("mapCountryModal");
      mapModal.dataset.activeRow = record.id;
      openModal(mapModal);
      return;
    }

    const historyBtn = e.target.closest("[data-history-btn]");
    if (historyBtn) {
      const record = currentRows().find((r) => String(r.id) === historyBtn.dataset.rowId);
      if (!record) return;
      const supplierLabel = SUPPLIER_LABELS[state.supplier] || state.supplier;
      document.getElementById("historyCountryName").textContent = `— ${supplierLabel} / ${record.name} (ID: ${record.supplierId})`;
      document.getElementById("historyList").innerHTML = renderHistoryList(record.history, "No mapping history yet");
      openModal(document.getElementById("historyModal"));
    }
  });

  document.getElementById("saveMappingBtn").addEventListener("click", () => {
    const modal = document.getElementById("mapCountryModal");
    const rowId = modal.dataset.activeRow;
    const record = currentRows().find((r) => String(r.id) === String(rowId));
    const selected = systemCountrySelect.value;
    if (!selected) {
      showToast("Please select a system country to map to", "error");
      return;
    }
    if (!record) return;
    const oldValue = record.systemCountry;
    record.systemCountry = selected;
    record.history.push({
      operation: "Map",
      systemCountry: selected,
      description: oldValue
        ? `Mapped To: ${getSystemCountryNameWithCode(oldValue)} -> ${getSystemCountryNameWithCode(selected)}`
        : `Mapped To: ${getSystemCountryNameWithCode(selected)}`,
      userName: CURRENT_USER.name,
      userEmail: CURRENT_USER.email,
      timestamp: new Date(),
    });
    saveToStorage("supplierCountries", supplierCountries);
    render();
    modal.classList.remove("open");
    showToast("Country mapped successfully");
  });

  document.getElementById("unmapCountryBtn").addEventListener("click", () => {
    const modal = document.getElementById("mapCountryModal");
    const rowId = modal.dataset.activeRow;
    const record = currentRows().find((r) => String(r.id) === String(rowId));
    if (!record || !record.systemCountry) return;

    showConfirm(
      `<p style="margin:0;">Unmap <strong>${record.name}</strong> from <strong>${record.systemCountry}</strong>?</p>`,
      () => {
        const oldValue = record.systemCountry;
        record.systemCountry = null;
        record.history.push({
          operation: "Unmap",
          systemCountry: null,
          description: `Mapped To: ${getSystemCountryNameWithCode(oldValue)} -> Not mapped`,
          userName: CURRENT_USER.name,
          userEmail: CURRENT_USER.email,
          timestamp: new Date(),
        });
        saveToStorage("supplierCountries", supplierCountries);
        render();
        modal.classList.remove("open");
        showToast(`${record.name} unmapped`);
      }
    );
  });

  // ---------- Confirm dialog (generic, mirrors city-mapping.html) ----------

  let pendingConfirmAction = null;

  function showConfirm(html, onConfirm) {
    document.getElementById("confirmMessage").innerHTML = html;
    pendingConfirmAction = onConfirm;
    openModal(document.getElementById("confirmModal"));
  }

  document.getElementById("confirmActionBtn").addEventListener("click", () => {
    const action = pendingConfirmAction;
    pendingConfirmAction = null;
    closeModal(document.getElementById("confirmModal"));
    if (action) action();
  });

  render();
</script>
</body>
</html>
