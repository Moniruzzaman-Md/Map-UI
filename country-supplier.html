      <template id="supplierCountryInfo">
        <p>This page maps each <strong>supplier's own country list</strong> to the system's master country list, so bookings from different suppliers can be matched to the same country record.</p>
        <ul>
          <li><strong>Country ID</strong> — the supplier's own identifier for this country. Fixed, not editable here.</li>
          <li><strong>Map</strong> — choose which system country a supplier's country corresponds to. If it's already mapped, an <strong>Unmap</strong> option appears in the same dialog, and reassigning to a different country asks you to confirm first.</li>
          <li><strong>History</strong> — every mapping made, remapped, or removed, with who made the change and when.</li>
          <li><strong>View Cities</strong> — open this supplier's city list, filtered to this country.</li>
        </ul>
      </template>

      <template id="supplierCountryDevNotes">
        <p>This is where each supplier's own country list gets matched to the system's master country list, so bookings from different suppliers can be reconciled to one record.</p>
        <ul>
          <li><strong>Map</strong> — pick which country on the master list a supplier's country corresponds to. Reassigning a country that's already mapped to a different one must show old vs. new and require explicit confirmation — never silent. Picking the same country it's already mapped to must not save or log anything.</li>
          <li><strong>Unmap</strong> — clear an existing mapping, leaving the supplier's country unmapped. Must require confirmation before removing it.</li>
          <li><strong>History</strong> — every entry has three parts: an <strong>operation name</strong>, a <strong>description</strong> in that operation's fixed pattern, and <strong>who + when</strong>. Logged the instant the change happens (never reconstructed later by comparing snapshots), newest entry first. A mapping change always writes to <strong>two</strong> records — this supplier's country AND the affected master-list country — no matter which screen made the change.
            <p>When a description needs to show more than one distinct fact — e.g. who made the change, and separately what it changed from/to — separate the facts with a single pipe character <code>|</code>. The history view splits on <code>|</code> and puts each part on its own line, so a card stays easy to scan instead of one dense run-on sentence. Only insert <code>|</code> between genuinely distinct facts, and never for any other purpose — it's reserved as the line-break marker.</p>
            <p><strong>On this supplier's own country record:</strong></p>
            <ul>
              <li><strong>Map</strong> — this is the first time this country has ever been linked to a master-list country. Description: <em>{new country} ({code})</em></li>
              <li><strong>Remap</strong> — an existing link changed to a different country. Description: <em>{old country} ({code}) -&gt; {new country} ({code})</em></li>
              <li><strong>Unmap</strong> — an existing link was removed, with nothing put in its place. Description: <em>{old country} ({code}) -&gt; Not mapped</em></li>
            </ul>
            <p><strong>On the matching master-list country's own record</strong> (the same event, from its side — always Map/Remap/Unmap, never Edit/Create, which are reserved for renaming a country, not a mapping change):</p>
            <ul>
              <li><strong>Map</strong> — this supplier's country became linked to it for the first time (it had no country before). Description: <em>{Supplier} — {supplier's country name} ({code}) — ID: {supplier's country ID}</em></li>
              <li><strong>Unmap</strong> — this supplier's country got unlinked entirely, with nothing put in its place. Description: <em>{Supplier} — {supplier's country name} ({code}) — ID: {supplier's country ID}</em></li>
              <li><strong>Remap</strong> — this supplier's country moved between two countries. Both the country it left and the country it moved to log this as one Remap event, never as Unmap on one and Map on the other — and both log the exact same description, so either country's history is understandable on its own. Description: <em>{Supplier} — {supplier's country name} ({code}) — ID: {supplier's country ID}|{old country} ({code}) -&gt; {new country} ({code})</em> (two lines: who, then what changed)</li>
            </ul>
          </li>
          <li><strong>View Cities</strong> — jumps to this supplier's city list, filtered to this country.</li>
        </ul>
        <p><strong>Everywhere:</strong> save immediately with clear success/error feedback, confirm before overwriting any existing relationship, and key relationships by permanent code/id — never by an editable name.</p>
      </template>

<script>
  const systemCountrySelect = document.getElementById("systemCountrySelect");
  systemCountrySelect.insertAdjacentHTML(
    "beforeend",
    SYSTEM_COUNTRIES.map((c) => `<option value="${c.name}">${c.name} (${c.code})</option>`).join("")
  );

  const tbody = document.querySelector("#supplierCountryTable tbody");
  const paginationBar = document.getElementById("paginationBar");
  const supplierFilter = document.getElementById("supplierFilter");
  supplierFilter.insertAdjacentHTML(
    "beforeend",
    Object.keys(SUPPLIER_LABELS)
      .map((key) => `<option value="${key}">${SUPPLIER_LABELS[key]}</option>`)
      .join("")
  );
  const mappedFilter = document.getElementById("mappedFilter");
  const countrySearch = document.getElementById("countrySearch");

  let state = { page: 1, pageSize: 10, supplier: "", mapped: "all", query: "" };

  function getFiltered() {
    if (!state.supplier) return [];
    let rows = supplierCountries[state.supplier] || [];
    if (state.mapped === "mapped") rows = rows.filter((r) => r.systemCountry);
    if (state.mapped === "unmapped") rows = rows.filter((r) => !r.systemCountry);
    const q = state.query.trim().toLowerCase();
    if (q) rows = rows.filter((r) => r.name.toLowerCase().includes(q) || r.supplierId.toLowerCase().includes(q));
    return rows;
  }

  function render() {
    if (!state.supplier) {
      tbody.innerHTML = `<tr><td colspan="4" class="empty-state">Select a supplier to view its country list</td></tr>`;
      paginationBar.innerHTML = "";
      return;
    }

    const filtered = getFiltered();
    const totalPages = Math.max(1, Math.ceil(filtered.length / state.pageSize));
    state.page = Math.min(state.page, totalPages);
    const startIdx = (state.page - 1) * state.pageSize;
    const pageItems = filtered.slice(startIdx, startIdx + state.pageSize);

    tbody.innerHTML = pageItems.length
      ? pageItems
          .map(
            (r) => `
      <tr>
        <td style="white-space:nowrap"><span class="code-badge">${r.supplierId}</span></td>
        <td>${r.name}</td>
        <td>${
          r.systemCountry
            ? `<span class="code-badge">${SYSTEM_COUNTRY_CODES[r.systemCountry] || "-"}</span> ${r.systemCountry}`
            : '<span class="text-not-mapped">Not mapped</span>'
        }</td>
        <td>
          <div class="row-actions">
            <button class="action-btn" data-map-btn data-row-id="${r.id}" aria-label="Map ${r.name}">
              <svg width="15" height="15" viewBox="0 0 24 24" fill="none"><path d="M9 17l-4.5 2V7L9 5m0 12l6 2m-6-2V5m6 14l4.5-2V5L15 7m0 12V7m0 0L9 5" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/></svg>
            </button>
            <button class="action-btn" data-history-btn data-row-id="${r.id}" aria-label="View mapping history for ${r.name}">
              <svg width="15" height="15" viewBox="0 0 24 24" fill="none"><path d="M3 12a9 9 0 109-9 9 9 0 00-7 3.3" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/><path d="M3 3.5V8h4.5" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/><path d="M12 7.5V12l3.2 2" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg>
            </button>
            <a class="action-btn" href="city-supplier.html?supplier=${state.supplier}&country=${r.code}" target="_blank" rel="noopener" aria-label="View cities in ${r.name}">
              <svg width="15" height="15" viewBox="0 0 24 24" fill="none"><path d="M3 21V10l5-3v14M8 21V7l5-4v18M13 21v-9l5 2.5v6.5" stroke="currentColor" stroke-width="1.6" stroke-linejoin="round"/><path d="M3 21h18" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/></svg>
            </a>
          </div>
        </td>
      </tr>`
          )
          .join("")
      : `<tr><td colspan="4" class="empty-state">No countries match this filter</td></tr>`;

    renderPagination(paginationBar, {
      total: filtered.length,
      page: state.page,
      pageSize: state.pageSize,
      onChange: ({ page, pageSize }) => {
        state.page = page;
        state.pageSize = pageSize;
        render();
      },
    });
  }

  supplierFilter.addEventListener("change", () => {
    state.supplier = supplierFilter.value;
    state.page = 1;
    mappedFilter.disabled = !state.supplier;
    countrySearch.disabled = !state.supplier;
    if (!state.supplier) {
      state.query = "";
      countrySearch.value = "";
      mappedFilter.value = "all";
      state.mapped = "all";
    }
    render();
  });

  mappedFilter.addEventListener("change", () => {
    state.mapped = mappedFilter.value;
    state.page = 1;
    render();
  });

  const runSearch = debounce(() => {
    state.query = countrySearch.value;
    state.page = 1;
    render();
  });
  countrySearch.addEventListener("input", runSearch);

  document.getElementById("resetSupplierCountryFilterBtn").addEventListener("click", () => {
    supplierFilter.value = "";
    supplierFilter.dispatchEvent(new Event("change"));
  });

  function currentRows() {
    return supplierCountries[state.supplier] || [];
  }

  document.addEventListener("click", (e) => {
    const mapBtn = e.target.closest("[data-map-btn]");
    if (mapBtn) {
      const record = currentRows().find((r) => String(r.id) === mapBtn.dataset.rowId);
      if (!record) return;
      document.getElementById("mapSupplierName").value = SUPPLIER_LABELS[state.supplier] || state.supplier;
      document.getElementById("mapSupplierCountryName").value = record.name;
      document.getElementById("mapSupplierCountryId").value = record.supplierId;
      systemCountrySelect.value = record.systemCountry || "";
      document.getElementById("unmapCountryBtn").style.display = record.systemCountry ? "" : "none";
      const mapModal = document.getElementById("mapCountryModal");
      mapModal.dataset.activeRow = record.id;
      openModal(mapModal);
      return;
    }

    const historyBtn = e.target.closest("[data-history-btn]");
    if (historyBtn) {
      const record = currentRows().find((r) => String(r.id) === historyBtn.dataset.rowId);
      if (!record) return;
      const supplierLabel = SUPPLIER_LABELS[state.supplier] || state.supplier;
      document.getElementById("historyCountryName").textContent = `— ${supplierLabel} / ${record.name} (ID: ${record.supplierId})`;
      showHistoryList(record.history, "No mapping history yet");
      openModal(document.getElementById("historyModal"));
    }
  });

  function applySupplierCountryMapping(record, selected) {
    const oldValue = record.systemCountry;
    const supplierCountryLabel = `${SUPPLIER_LABELS[state.supplier] || state.supplier} — ${record.name} (${record.code}) — ID: ${record.supplierId}`;

    record.systemCountry = selected;
    record.history.push({
      // "Remap" (not "Map") when replacing an existing mapping with a
      // different one — matches the Map/Remap/Unmap vocabulary used
      // everywhere a mapping (not an entity property) changes; Unmap has
      // its own separate button/handler below.
      operation: oldValue ? "Remap" : "Map",
      systemCountry: selected,
      description: oldValue
        ? `${getSystemCountryNameWithCode(oldValue)} -> ${getSystemCountryNameWithCode(selected)}`
        : `${getSystemCountryNameWithCode(selected)}`,
      userName: CURRENT_USER.name,
      userEmail: CURRENT_USER.email,
      timestamp: new Date(),
    });

    // Dual-side logging, same reasoning as country-system.html's own
    // applyCountryMapping: the supplier country has one evolving value so
    // it gets the Map/Remap/Unmap changelog above; each affected system
    // country instead gets an additive/removal log line, since it can be
    // the target of several different suppliers' countries over time. A
    // remap (oldValue present, since `selected` is always present here —
    // a true unmap goes through the separate Unmap handler below) is one
    // event touching two country records, not two independent actions —
    // both sides log it as Remap, not Unmap/Map.
    const isRemap = Boolean(oldValue);
    // On a genuine remap, both affected countries' own history must say
    // exactly where the supplier country moved from and to (not just that
    // it changed) — same "old -> new" convention as this supplier country's
    // own "old -> new" changelog above, appended so either country's
    // history is legible on its own without cross-referencing the other.
    // HISTORY_LINE_BREAK (js/app.js) puts this on its own line instead of
    // cramming the "who" and the "old -> new" into one dense sentence.
    const remapSuffix = isRemap ? `${HISTORY_LINE_BREAK}${getSystemCountryNameWithCode(oldValue)} -> ${getSystemCountryNameWithCode(selected)}` : "";

    if (oldValue) {
      const oldCountry = SYSTEM_COUNTRIES.find((c) => c.name === oldValue);
      if (oldCountry) {
        oldCountry.history.push({
          operation: isRemap ? "Remap" : "Unmap",
          description: `${supplierCountryLabel}${remapSuffix}`,
          userName: CURRENT_USER.name,
          userEmail: CURRENT_USER.email,
          timestamp: new Date(),
        });
      }
    }
    const newCountry = SYSTEM_COUNTRIES.find((c) => c.name === selected);
    if (newCountry) {
      newCountry.history.push({
        operation: isRemap ? "Remap" : "Map",
        description: `${supplierCountryLabel}${remapSuffix}`,
        userName: CURRENT_USER.name,
        userEmail: CURRENT_USER.email,
        timestamp: new Date(),
      });
    }

    saveToStorage("supplierCountries", supplierCountries);
    saveToStorage("SYSTEM_COUNTRIES", SYSTEM_COUNTRIES);
    render();
    document.getElementById("mapCountryModal").classList.remove("open");
    showToast("Country mapped successfully");
  }

  document.getElementById("saveMappingBtn").addEventListener("click", () => {
    const modal = document.getElementById("mapCountryModal");
    const rowId = modal.dataset.activeRow;
    const record = currentRows().find((r) => String(r.id) === String(rowId));
    const selected = systemCountrySelect.value;
    if (!selected) {
      showToast("Please select a system country to map to", "error");
      return;
    }
    if (!record) return;
    const oldValue = record.systemCountry;

    // No actual change (same country re-selected) — nothing to save or log.
    if (oldValue === selected) {
      modal.classList.remove("open");
      return;
    }

    // Reassigning a country that's already mapped elsewhere must never be
    // silent — show exactly what's changing and require confirmation,
    // same remap-compare pattern used by the System Country List's own
    // bulk Map modal and city-mapping.html's remap confirm.
    if (oldValue) {
      showConfirm(
        `
        <div class="remap-subject"><strong>${record.name}</strong> <span class="code-badge">${record.code}</span> is already mapped. Remap it?</div>
        <div class="remap-compare">
          <div class="remap-box">
            <div class="remap-box-label">Currently mapped to</div>
            <div class="remap-box-value">${getSystemCountryNameWithCode(oldValue)}</div>
          </div>
          <div class="remap-arrow" aria-hidden="true">&rarr;</div>
          <div class="remap-box remap-box-target">
            <div class="remap-box-label">Will map to</div>
            <div class="remap-box-value">${getSystemCountryNameWithCode(selected)}</div>
          </div>
        </div>
        `,
        () => applySupplierCountryMapping(record, selected)
      );
      return;
    }

    applySupplierCountryMapping(record, selected);
  });

  document.getElementById("unmapCountryBtn").addEventListener("click", () => {
    const modal = document.getElementById("mapCountryModal");
    const rowId = modal.dataset.activeRow;
    const record = currentRows().find((r) => String(r.id) === String(rowId));
    if (!record || !record.systemCountry) return;

    showConfirm(
      `<p style="margin:0;">Unmap <strong>${record.name}</strong> from <strong>${record.systemCountry}</strong>?</p>`,
      () => {
        const oldValue = record.systemCountry;
        record.systemCountry = null;
        record.history.push({
          operation: "Unmap",
          systemCountry: null,
          description: `${getSystemCountryNameWithCode(oldValue)} -> Not mapped`,
          userName: CURRENT_USER.name,
          userEmail: CURRENT_USER.email,
          timestamp: new Date(),
        });

        const oldCountry = SYSTEM_COUNTRIES.find((c) => c.name === oldValue);
        if (oldCountry) {
          const supplierCountryLabel = `${SUPPLIER_LABELS[state.supplier] || state.supplier} — ${record.name} (${record.code}) — ID: ${record.supplierId}`;
          oldCountry.history.push({
            operation: "Unmap",
            description: supplierCountryLabel,
            userName: CURRENT_USER.name,
            userEmail: CURRENT_USER.email,
            timestamp: new Date(),
          });
        }

        saveToStorage("supplierCountries", supplierCountries);
        saveToStorage("SYSTEM_COUNTRIES", SYSTEM_COUNTRIES);
        render();
        modal.classList.remove("open");
        showToast(`${record.name} unmapped`);
      }
    );
  });

  // ---------- Confirm dialog (generic, mirrors city-mapping.html) ----------

  let pendingConfirmAction = null;

  function showConfirm(html, onConfirm) {
    document.getElementById("confirmMessage").innerHTML = html;
    pendingConfirmAction = onConfirm;
    openModal(document.getElementById("confirmModal"));
  }

  document.getElementById("confirmActionBtn").addEventListener("click", () => {
    const action = pendingConfirmAction;
    pendingConfirmAction = null;
    closeModal(document.getElementById("confirmModal"));
    if (action) action();
  });

  render();
</script>
</body>
</html>
