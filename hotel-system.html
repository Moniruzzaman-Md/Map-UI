<script src="js/app.js"></script>
<script src="js/data.js"></script>
<script>
  const countryFilterSelect = document.getElementById("hotelCountryFilter");
  countryFilterSelect.insertAdjacentHTML(
    "beforeend",
    SYSTEM_COUNTRIES.map((c) => `<option value="${c.name}">${c.name} (${c.code})</option>`).join("")
  );

  const stateFilterSelect = document.getElementById("hotelStateFilter");
  const cityFilterSelect = document.getElementById("hotelCityFilter");
  const statusFilterSelect = document.getElementById("hotelStatusFilter");
  const tbody = document.querySelector("#hotelTable tbody");
  const paginationBar = document.getElementById("paginationBar");
  const hotelSearch = document.getElementById("hotelSearch");
  const hotelTableEl = document.getElementById("hotelTable");
  const revealValuesToggle = document.getElementById("hotelRevealValuesToggle");

  let state = { page: 1, pageSize: 10, query: "", country: "", hotelState: "", city: "", status: "all" };

  function getFiltered() {
    let rows = SYSTEM_HOTELS;
    const q = state.query.trim().toLowerCase();
    if (q) rows = rows.filter((h) => h.name.toLowerCase().includes(q));
    if (state.country) rows = rows.filter((h) => (getSystemCountryName(resolveHotelLocation(h).country.code) || resolveHotelLocation(h).country.name) === state.country);
    if (state.hotelState) rows = rows.filter((h) => resolveHotelLocation(h).state === state.hotelState);
    if (state.city) rows = rows.filter((h) => resolveHotelLocation(h).city === state.city);
    if (state.status === "active") rows = rows.filter((h) => h.active);
    if (state.status === "inactive") rows = rows.filter((h) => !h.active);
    return rows;
  }

  // City filter is a facet over whichever country/state is currently
  // selected — hotel city is a plain field, not a lookup into a master city
  // list, so its options are just the distinct city values present here.
  // Resolved live via resolveHotelLocation() (js/data.js) rather than the
  // hotel's own stored snapshot, so a rename on city-system.html or
  // country-system.html is reflected here without re-saving every hotel.
  function updateCityFilterOptions() {
    let candidates = SYSTEM_HOTELS;
    if (state.country) candidates = candidates.filter((h) => (getSystemCountryName(resolveHotelLocation(h).country.code) || resolveHotelLocation(h).country.name) === state.country);
    if (state.hotelState) candidates = candidates.filter((h) => resolveHotelLocation(h).state === state.hotelState);
    const cities = [...new Set(candidates.map((h) => resolveHotelLocation(h).city))].sort();
    const current = state.city;
    cityFilterSelect.innerHTML = `<option value="">All Cities</option>` + cities.map((c) => `<option value="${c}">${c}</option>`).join("");
    cityFilterSelect.disabled = cities.length === 0;
    if (cities.includes(current)) {
      cityFilterSelect.value = current;
    } else {
      state.city = "";
    }
  }

  function render() {
    const filtered = getFiltered();
    const totalPages = Math.max(1, Math.ceil(filtered.length / state.pageSize));
    state.page = Math.min(state.page, totalPages);
    const startIdx = (state.page - 1) * state.pageSize;
    const pageItems = filtered.slice(startIdx, startIdx + state.pageSize);

    // Every value column is wrapped in .truncatable (fixed width per
    // column, see styles.css) instead of a plain <td> — guarantees a
    // single line per cell (never wraps to 2 lines) no matter how long
    // the real value is. Short values render fully with no visual change;
    // long ones are simply clipped, fading out toward the trailing edge,
    // once refreshValueOverflowState() (below) measures real overflow —
    // there's no scrolling to see the rest, only the tooltip (title="")
    // or the "Show full values" toggle reveal it, and the toggle never
    // changes the column width. A blank value is never wrapped in
    // .truncatable at all — there's nothing to truncate. Status (a pill)
    // and Action (icon buttons) are the only columns that stay plain —
    // they're fixed, compact elements, not free-text values that can
    // overflow.
    function truncatableCell(value, modifier) {
      if (!value) return `<span style="color:var(--text-muted)">—</span>`;
      return `<div class="truncatable truncatable--${modifier}" title="${value}"><span class="truncatable-text">${value}</span></div>`;
    }

    tbody.innerHTML = pageItems.length
      ? pageItems
          .map((h) => {
            const loc = resolveHotelLocation(h);
            const countryName = getSystemCountryName(loc.country.code) || loc.country.name;
            const countryPlain = `${countryName} (${loc.country.code})`;
            return `
      <tr data-row-id="${h.id}">
        <td>${truncatableCell(getSystemHotelDisplayId(h.id), "id")}</td>
        <td data-col="name">${truncatableCell(h.name, "name")}</td>
        <td>${truncatableCell(h.address, "address")}</td>
        <td>${truncatableCell(loc.city, "city")}</td>
        <td>${truncatableCell(loc.state, "state")}</td>
        <td>
          <div class="truncatable truncatable--country" title="${countryPlain}">
            <span class="truncatable-text">${countryName} <span class="code-badge">${loc.country.code}</span></span>
          </div>
        </td>
        <td>${truncatableCell(`${h.starRating} ★`, "starrating")}</td>
        <td>${truncatableCell(h.email, "email")}</td>
        <td>${truncatableCell(h.phoneNumber, "phone")}</td>
        <td>${truncatableCell(h.providerId, "providerid")}</td>
        <td><span class="pill ${h.active ? "success" : "danger"}">${h.active ? "Active" : "Inactive"}</span></td>
        <td>
          <div class="row-actions">
            <button class="action-btn" data-edit-btn data-row-id="${h.id}" aria-label="Edit ${h.name}">
              <svg width="15" height="15" viewBox="0 0 24 24" fill="none"><path d="M16.5 3.5a2.1 2.1 0 013 3L7 19l-4 1 1-4L16.5 3.5z" stroke="currentColor" stroke-width="1.6" stroke-linejoin="round"/></svg>
            </button>
            <button class="action-btn" data-history-btn data-row-id="${h.id}" aria-label="View edit history for ${h.name}">
              <svg width="15" height="15" viewBox="0 0 24 24" fill="none"><path d="M3 12a9 9 0 109-9 9 9 0 00-7 3.3" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/><path d="M3 3.5V8h4.5" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/><path d="M12 7.5V12l3.2 2" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg>
            </button>
            <button class="action-btn" data-toggle-active-btn data-row-id="${h.id}" aria-label="${h.active ? "Deactivate" : "Activate"} ${h.name}">
              <svg width="15" height="15" viewBox="0 0 24 24" fill="none"><path d="M12 2v10" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/><path d="M6 5a8 8 0 106.5-1.5" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/></svg>
            </button>
          </div>
        </td>
      </tr>`;
          })
          .join("")
      : `<tr><td colspan="12" class="empty-state">No hotels found</td></tr>`;

    renderPagination(paginationBar, {
      total: filtered.length,
      page: state.page,
      pageSize: state.pageSize,
      onChange: ({ page, pageSize }) => {
        state.page = page;
        state.pageSize = pageSize;
        render();
      },
    });

    refreshValueOverflowState();
  }

  // Re-measures every .truncatable cell after each render() (search/filter/
  // pagination change) and after the "Show full values" toggle flips —
  // only cells whose content genuinely doesn't fit their fixed width get
  // .is-overflowing (and therefore the fade-out via CSS); a short value
  // that already fits gets no visual treatment at all.
  function refreshValueOverflowState() {
    document.querySelectorAll("#hotelTable .truncatable").forEach((el) => {
      el.classList.toggle("is-overflowing", el.scrollWidth > el.clientWidth + 1);
    });
  }

  revealValuesToggle.addEventListener("change", () => {
    hotelTableEl.classList.toggle("reveal-values", revealValuesToggle.checked);
    refreshValueOverflowState();
  });

  const runSearch = debounce(() => {
    state.query = hotelSearch.value;
    state.page = 1;
    render();
  });
  hotelSearch.addEventListener("input", runSearch);

  countryFilterSelect.addEventListener("change", () => {
    state.country = countryFilterSelect.value;
    state.page = 1;
    state.hotelState = "";

    const countryMeta = SYSTEM_COUNTRIES.find((c) => c.name === state.country);
    const states = countryMeta ? getStatesForCountryCode(countryMeta.code) : [];

    if (states.length) {
      stateFilterSelect.disabled = false;
      stateFilterSelect.innerHTML =
        `<option value="">All States</option>` + states.map((s) => `<option value="${s}">${s}</option>`).join("");
    } else {
      stateFilterSelect.disabled = true;
      stateFilterSelect.innerHTML = `<option value="">${countryMeta ? "No state required" : "Select State"}</option>`;
    }
    updateCityFilterOptions();
    render();
  });

  stateFilterSelect.addEventListener("change", () => {
    state.hotelState = stateFilterSelect.value;
    state.page = 1;
    updateCityFilterOptions();
    render();
  });

  cityFilterSelect.addEventListener("change", () => {
    state.city = cityFilterSelect.value;
    state.page = 1;
    render();
  });

  statusFilterSelect.addEventListener("change", () => {
    state.status = statusFilterSelect.value;
    state.page = 1;
    render();
  });

  document.getElementById("resetHotelFilterBtn").addEventListener("click", () => {
    hotelSearch.value = "";
    countryFilterSelect.value = "";
    stateFilterSelect.disabled = true;
    stateFilterSelect.innerHTML = `<option value="">Select State</option>`;
    statusFilterSelect.value = "all";
    state = { ...state, page: 1, query: "", country: "", hotelState: "", city: "", status: "all" };
    updateCityFilterOptions();
    render();
  });

  updateCityFilterOptions();
  render();

  // ---------- Row actions: Edit / History / Toggle Active ----------

  document.addEventListener("click", (e) => {
    const editBtn = e.target.closest("[data-edit-btn]");
    if (editBtn) {
      openHotelForm(SYSTEM_HOTELS.find((h) => String(h.id) === editBtn.dataset.rowId));
      return;
    }

    const historyBtn = e.target.closest("[data-history-btn]");
    if (historyBtn) {
      const record = SYSTEM_HOTELS.find((h) => String(h.id) === historyBtn.dataset.rowId);
      if (!record) return;
      document.getElementById("historyHotelName").textContent = `— ${record.name} (ID: ${getSystemHotelDisplayId(record.id)})`;
      document.getElementById("historyList").innerHTML = renderHistoryList(record.history, "No edit history yet");
      openModal(document.getElementById("historyModal"));
      return;
    }

    const toggleBtn = e.target.closest("[data-toggle-active-btn]");
    if (toggleBtn) {
      const record = SYSTEM_HOTELS.find((h) => String(h.id) === toggleBtn.dataset.rowId);
      if (!record) return;
      const wasActive = record.active;
      record.active = !record.active;
      record.history.push({
        operation: "Status Change",
        status: record.active,
        description: `Status: ${wasActive ? "Active" : "Inactive"} -> ${record.active ? "Active" : "Inactive"}`,
        userName: CURRENT_USER.name,
        userEmail: CURRENT_USER.email,
        timestamp: new Date(),
      });
      saveToStorage("SYSTEM_HOTELS", SYSTEM_HOTELS);
      render();
      showToast(`${record.name} marked ${record.active ? "Active" : "Inactive"}`);
    }
  });

  // ---------- Add / Edit Hotel form ----------

  const hotelFormModal = document.getElementById("hotelFormModal");
  const hotelFormTitle = document.getElementById("hotelFormTitle");
  const hotelFormId = document.getElementById("hotelFormId");
  const hotelFormName = document.getElementById("hotelFormName");
  const hotelFormAddress = document.getElementById("hotelFormAddress");
  const hotelFormCountry = document.getElementById("hotelFormCountry");
  const hotelFormState = document.getElementById("hotelFormState");
  const hotelFormCity = document.getElementById("hotelFormCity");
  const hotelFormLatitude = document.getElementById("hotelFormLatitude");
  const hotelFormLongitude = document.getElementById("hotelFormLongitude");
  const hotelFormStarRating = document.getElementById("hotelFormStarRating");
  const hotelFormEmail = document.getElementById("hotelFormEmail");
  const hotelFormPhone = document.getElementById("hotelFormPhone");
  const hotelFormProviderId = document.getElementById("hotelFormProviderId");

  hotelFormCountry.insertAdjacentHTML(
    "beforeend",
    SYSTEM_COUNTRIES.map((c) => `<option value="${c.name}">${c.name} (${c.code})</option>`).join("")
  );

  function populateHotelFormStates(countryName, selectedState) {
    const meta = SYSTEM_COUNTRIES.find((c) => c.name === countryName);
    const states = meta ? getStatesForCountryCode(meta.code) : [];
    if (states.length) {
      hotelFormState.disabled = false;
      hotelFormState.innerHTML =
        `<option value="">Select state</option>` + states.map((s) => `<option value="${s}">${s}</option>`).join("");
      if (selectedState) hotelFormState.value = selectedState;
    } else {
      hotelFormState.disabled = true;
      hotelFormState.innerHTML = `<option value="">${meta ? "No state required" : "Select country first"}</option>`;
    }
  }

  // City is picked from SYSTEM_CITIES (the same master list "Pin a System
  // City" in city-mapping.html uses), not free-typed — country gates the
  // list, state (if the country has one) narrows it further but is never
  // required, matching this project's established "state is an optional
  // extra filter, never gates the load" convention. Prepopulated cities and
  // New City entries are both eligible — a hotel can be directly attached
  // to either. A Merged city is excluded: it has no identity of its own to
  // attach a hotel to, it's only ever a view over its component cities'
  // supplier mappings (see city-system.html's Merge Cities info popup).
  function populateHotelFormCities(countryName, stateValue, selectedCityId) {
    if (!countryName) {
      hotelFormCity.disabled = true;
      hotelFormCity.innerHTML = `<option value="">Select country first</option>`;
      return;
    }
    // Matches by code (stable) rather than the passed-in name, so a city
    // whose country.name snapshot predates a rename on country-system.html
    // is still correctly matched against the country's current name.
    const countryMeta = SYSTEM_COUNTRIES.find((c) => c.name === countryName);
    let candidates = countryMeta ? SYSTEM_CITIES.filter((c) => c.cityType !== "merged" && c.country.code === countryMeta.code) : [];
    if (stateValue) candidates = candidates.filter((c) => c.state === stateValue);
    hotelFormCity.disabled = candidates.length === 0;
    hotelFormCity.innerHTML = candidates.length
      ? `<option value="">Select city</option>` + candidates.map((c) => `<option value="${c.id}">${c.name}</option>`).join("")
      : `<option value="">No eligible cities here</option>`;
    if (selectedCityId !== null && selectedCityId !== undefined) {
      hotelFormCity.value = String(selectedCityId);
    }
  }

  hotelFormCountry.addEventListener("change", () => {
    populateHotelFormStates(hotelFormCountry.value, "");
    populateHotelFormCities(hotelFormCountry.value, "", null);
  });

  hotelFormState.addEventListener("change", () => {
    populateHotelFormCities(hotelFormCountry.value, hotelFormState.value, null);
  });

  // Opens the shared form in either mode: no argument (or falsy) = Add, a
  // hotel record = Edit with every field pre-filled. Add and Edit use the
  // exact same field set here (unlike City, where Edit only allows renaming)
  // since the user asked for every field except id and provider id to be
  // editable — id is always disabled (assigned on save), and provider id is
  // free-text on Add but locked (disabled) once the hotel exists, same
  // "not editable after creation" rule as id.
  function openHotelForm(record) {
    hotelFormModal.dataset.activeRow = record ? record.id : "";
    hotelFormTitle.textContent = record ? "Edit Hotel" : "Add Hotel";

    // Resolved live rather than read off the record's own snapshot, so a
    // rename on city-system.html/country-system.html since this hotel was
    // last saved doesn't leave the Country/City selects unable to match any
    // option (a stale name wouldn't be found among the freshly-populated
    // <option>s below).
    const loc = record ? resolveHotelLocation(record) : null;
    const countryName = loc ? getSystemCountryName(loc.country.code) || loc.country.name : "";

    hotelFormId.value = record ? getSystemHotelDisplayId(record.id) : "";
    hotelFormName.value = record ? record.name : "";
    hotelFormAddress.value = record ? record.address : "";
    hotelFormLatitude.value = record ? record.latitude : "";
    hotelFormLongitude.value = record ? record.longitude : "";
    hotelFormStarRating.value = record ? String(record.starRating) : "5";
    hotelFormEmail.value = record ? record.email || "" : "";
    hotelFormPhone.value = record ? record.phoneNumber || "" : "";
    hotelFormProviderId.value = record ? record.providerId || "" : "";
    hotelFormProviderId.disabled = Boolean(record);
    hotelFormCountry.value = countryName;
    populateHotelFormStates(countryName, loc ? loc.state : "");
    populateHotelFormCities(countryName, loc ? loc.state : "", record ? record.systemCityId : null);

    openModal(hotelFormModal);
  }

  document.getElementById("addHotelBtn").addEventListener("click", () => openHotelForm(null));

  document.getElementById("saveHotelBtn").addEventListener("click", () => {
    const name = hotelFormName.value.trim();
    const countryName = hotelFormCountry.value;
    const cityRecord = hotelFormCity.value ? SYSTEM_CITIES.find((c) => c.id === Number(hotelFormCity.value)) : null;
    if (!name) {
      showToast("Hotel name is required", "error");
      return;
    }
    if (!countryName) {
      showToast("Please select a country", "error");
      return;
    }
    if (!cityRecord) {
      showToast("Please select a city", "error");
      return;
    }
    if (!hotelFormProviderId.value.trim()) {
      showToast("Provider ID is required", "error");
      return;
    }

    const meta = SYSTEM_COUNTRIES.find((c) => c.name === countryName);
    const city = cityRecord.name;
    const newState = cityRecord.state;
    const systemCityId = cityRecord.id;
    const address = hotelFormAddress.value.trim();
    const latitude = hotelFormLatitude.value === "" ? null : Number(hotelFormLatitude.value);
    const longitude = hotelFormLongitude.value === "" ? null : Number(hotelFormLongitude.value);
    const starRating = Number(hotelFormStarRating.value);
    const email = hotelFormEmail.value.trim();
    const phoneNumber = hotelFormPhone.value.trim();
    const providerId = hotelFormProviderId.value.trim();

    const rowId = hotelFormModal.dataset.activeRow;

    if (rowId === "") {
      // Add
      SYSTEM_HOTELS.push({
        id: SYSTEM_HOTELS.length,
        name,
        address,
        latitude,
        longitude,
        starRating,
        city,
        state: newState,
        country: { name: meta.name, code: meta.code },
        systemCityId,
        email,
        phoneNumber,
        providerId,
        active: true,
        history: [
          {
            operation: "Create",
            name,
            description: [
              `Name: ${name}`,
              `Address: ${address}`,
              `City: ${city}`,
              newState ? `State: ${newState}` : null,
              `Country: ${meta.name} (${meta.code})`,
              `Star Rating: ${starRating}`,
              email ? `Email: ${email}` : null,
              phoneNumber ? `Phone Number: ${phoneNumber}` : null,
              providerId ? `Provider ID: ${providerId}` : null,
            ]
              .filter(Boolean)
              .join(", "),
            userName: CURRENT_USER.name,
            userEmail: CURRENT_USER.email,
            timestamp: new Date(),
          },
        ],
      });
      showToast("Hotel added successfully");
    } else {
      // Edit — build an old -> new changelog only for fields that actually
      // changed, matching this project's history-description convention.
      const record = SYSTEM_HOTELS.find((h) => String(h.id) === String(rowId));
      if (!record) return;

      const changes = [];
      function diff(label, oldVal, newVal) {
        if (oldVal !== newVal) changes.push(`${label}: ${oldVal ?? "—"} -> ${newVal ?? "—"}`);
      }
      // Compare against the resolved-live location, not the raw stored
      // snapshot — otherwise re-saving a hotel whose city/country was
      // renamed elsewhere logs a misleading "you changed City/Country"
      // entry for a change the user never made here.
      const oldLoc = resolveHotelLocation(record);
      const oldCountryName = getSystemCountryName(oldLoc.country.code) || oldLoc.country.name;
      diff("Name", record.name, name);
      diff("Address", record.address, address);
      diff("City", oldLoc.city, city);
      diff("State", oldLoc.state, newState);
      diff("Country", oldCountryName, meta.name);
      diff("Latitude", record.latitude, latitude);
      diff("Longitude", record.longitude, longitude);
      diff("Star Rating", record.starRating, starRating);
      diff("Email", record.email || null, email || null);
      diff("Phone Number", record.phoneNumber || null, phoneNumber || null);
      // Id and Provider Id are intentionally excluded here — both are fixed
      // at creation and not editable, so record.providerId is never
      // reassigned below (hotelFormProviderId is disabled while editing,
      // matching hotelFormId).

      record.name = name;
      record.address = address;
      record.city = city;
      record.state = newState;
      record.country = { name: meta.name, code: meta.code };
      record.systemCityId = systemCityId;
      record.latitude = latitude;
      record.longitude = longitude;
      record.starRating = starRating;
      record.email = email;
      record.phoneNumber = phoneNumber;

      if (changes.length) {
        record.history.push({
          operation: "Edit",
          name,
          description: changes.join(", "),
          userName: CURRENT_USER.name,
          userEmail: CURRENT_USER.email,
          timestamp: new Date(),
        });
      }
      showToast("Hotel updated successfully");
    }

    saveToStorage("SYSTEM_HOTELS", SYSTEM_HOTELS);
    updateCityFilterOptions();
    render();
    hotelFormModal.classList.remove("open");
  });
</script>
</body>
</html>
