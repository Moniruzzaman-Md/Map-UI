      <template id="hotelListInfo">
        <p>This page manages the <strong>master list of hotels</strong> used across the system.</p>
        <ul>
          <li><strong>Hotel</strong> — the hotel's name and address. Click the info icon to see both in full.</li>
          <li><strong>Location</strong> — city, state, and country. Click the info icon for the full breakdown, including the country's code.</li>
          <li><strong>GPS</strong> — latitude and longitude. Click the info icon to see the exact coordinates.</li>
          <li><strong>Contact</strong> — email and phone number. Click the info icon to see both in full.</li>
          <li><strong>Edit</strong> — every field is editable except the hotel's <strong>Id</strong> and <strong>Provider Id</strong>, which are fixed once the hotel is created.</li>
          <li><strong>History</strong> — view every change: creation, edits, and status changes.</li>
          <li><strong>Active/Inactive toggle</strong> — controls whether a hotel is available for booking. Changes immediately, no confirmation needed, and is logged to History.</li>
          <li>Type a name and tick <strong>Fuzzy</strong> to match it loosely (forgiving of typos or skipped letters) instead of requiring an exact substring.</li>
          <li>Nothing you type or pick filters the list right away — click <strong>Search</strong> (or press Enter in a search box) to apply it. Click <strong>Filters</strong> to reveal the rest: ID, Provider ID, Country/State/City, Star Rating, and Status. City only opens up once a Country is picked. While collapsed, anything you've set shows as a removable chip — click a chip's × to clear just that one filter. <strong>Reset</strong> clears everything and shows the full list immediately, no Search needed.</li>
        </ul>
      </template>

      <template id="hotelListDevNotes">
        <p>The single master hotel list every other hotel-facing page reads from — a supplier's own hotel feed is matched to one of these by Provider ID, never stored as a direct link.</p>
        <ul>
          <li><strong>Id</strong> — permanent once assigned, never editable.</li>
          <li><strong>Location</strong> — resolved live from the hotel's own linked city record rather than a stored snapshot, so a rename to that city or its country is reflected here immediately without re-saving every hotel.</li>
          <li><strong>City</strong> — picked from the master city list, gated behind Country the same way everywhere else in the project is: State narrows the choices but is never required, City requires a Country first.</li>
          <li><strong>Filters</strong> — nothing in the toolbar re-queries the list on its own; every field only updates the pending state and the live Filters count pill / chip summary (visible once the panel is collapsed). The list itself only re-queries on <strong>Search</strong> (or Enter in a search box) or <strong>Reset</strong>, which re-renders immediately.</li>
        </ul>
      </template>

<script>
  const countryFilterSelect = document.getElementById("hotelCountryFilter");
  countryFilterSelect.insertAdjacentHTML(
    "beforeend",
    SYSTEM_COUNTRIES.map((c) => `<option value="${c.name}">${c.name} (${c.code})</option>`).join("")
  );

  const stateFilterSelect = document.getElementById("hotelStateFilter");
  const cityFilterSelect = document.getElementById("hotelCityFilter");
  const starRatingFilterSelect = document.getElementById("hotelStarRatingFilter");
  const statusFilterSelect = document.getElementById("hotelStatusFilter");
  const tbody = document.querySelector("#hotelTable tbody");
  const paginationBar = document.getElementById("paginationBar");
  const hotelSearch = document.getElementById("hotelSearch");
  const hotelFuzzyToggle = document.getElementById("hotelFuzzyToggle");
  const hotelSearchBtn = document.getElementById("hotelSearchBtn");
  const hotelIdSearch = document.getElementById("hotelIdSearch");
  const hotelProviderIdSearch = document.getElementById("hotelProviderIdSearch");
  const hotelTableEl = document.getElementById("hotelTable");
  const revealValuesToggle = document.getElementById("hotelRevealValuesToggle");

  let state = {
    page: 1,
    pageSize: 10,
    query: "",
    fuzzy: false,
    idQuery: "",
    providerIdQuery: "",
    country: "",
    hotelState: "",
    city: "",
    starRating: "",
    status: "all",
  };

  // Subsequence match: every character of the query must appear in the name
  // in order, not necessarily contiguous (e.g. "grpz" matches "Grand
  // Plaza") — same convention as hotel-mapping.html's own Fuzzy search.
  // Loose on purpose: forgiving of typos/skipped letters, not a ranked
  // match.
  function fuzzyMatches(name, query) {
    let i = 0;
    for (let j = 0; j < name.length && i < query.length; j++) {
      if (name[j] === query[i]) i++;
    }
    return i === query.length;
  }

  function getFiltered() {
    let rows = SYSTEM_HOTELS;
    const q = state.query.trim().toLowerCase();
    if (q) rows = rows.filter((h) => (state.fuzzy ? fuzzyMatches(h.name.toLowerCase(), q) : h.name.toLowerCase().includes(q)));
    const idQ = state.idQuery.trim().toLowerCase();
    if (idQ) rows = rows.filter((h) => getSystemHotelDisplayId(h.id).toLowerCase().includes(idQ));
    const providerIdQ = state.providerIdQuery.trim().toLowerCase();
    if (providerIdQ) rows = rows.filter((h) => (h.providerId || "").toLowerCase().includes(providerIdQ));
    if (state.country) rows = rows.filter((h) => (getSystemCountryName(resolveHotelLocation(h).country.code) || resolveHotelLocation(h).country.name) === state.country);
    if (state.hotelState) rows = rows.filter((h) => resolveHotelLocation(h).state === state.hotelState);
    if (state.city) rows = rows.filter((h) => resolveHotelLocation(h).city === state.city);
    if (state.starRating) rows = rows.filter((h) => String(h.starRating) === state.starRating);
    if (state.status === "active") rows = rows.filter((h) => h.active);
    if (state.status === "inactive") rows = rows.filter((h) => !h.active);
    return rows;
  }

  // City filter is a facet over whichever country/state is currently
  // selected — hotel city is a plain field, not a lookup into a master city
  // list, so its options are just the distinct city values present here.
  // Resolved live via resolveHotelLocation() (js/data.js) rather than the
  // hotel's own stored snapshot, so a rename on city-system.html or
  // country-system.html is reflected here without re-saving every hotel.
  // City is gated behind Country (loaded country-wise) — picking a Country
  // is required before City has anything to show, same reasoning as State
  // being gated on Country already.
  function updateCityFilterOptions() {
    if (!state.country) {
      cityFilterSelect.innerHTML = `<option value="">Select country first</option>`;
      cityFilterSelect.disabled = true;
      state.city = "";
      return;
    }
    let candidates = SYSTEM_HOTELS.filter((h) => (getSystemCountryName(resolveHotelLocation(h).country.code) || resolveHotelLocation(h).country.name) === state.country);
    if (state.hotelState) candidates = candidates.filter((h) => resolveHotelLocation(h).state === state.hotelState);
    const cityStateByName = new Map();
    candidates.forEach((h) => {
      const loc = resolveHotelLocation(h);
      if (!cityStateByName.has(loc.city)) cityStateByName.set(loc.city, loc.state);
    });
    const cities = [...cityStateByName.keys()].sort();
    const current = state.city;
    cityFilterSelect.innerHTML =
      `<option value="">All Cities</option>` +
      cities.map((c) => `<option value="${c}">${cityStateByName.get(c) ? `${c} - ${cityStateByName.get(c)}` : c}</option>`).join("");
    cityFilterSelect.disabled = cities.length === 0;
    if (cities.includes(current)) {
      cityFilterSelect.value = current;
    } else {
      state.city = "";
    }
  }

  function render() {
    const filtered = getFiltered();
    const totalPages = Math.max(1, Math.ceil(filtered.length / state.pageSize));
    state.page = Math.min(state.page, totalPages);
    const startIdx = (state.page - 1) * state.pageSize;
    const pageItems = filtered.slice(startIdx, startIdx + state.pageSize);

    // Every value column is wrapped in .truncatable (fixed width per
    // column, see styles.css) instead of a plain <td> — guarantees a
    // single line per cell (never wraps to 2 lines) no matter how long
    // the real value is. Short values render fully with no visual change;
    // long ones are simply clipped, fading out toward the trailing edge,
    // once refreshValueOverflowState() (below) measures real overflow —
    // there's no scrolling to see the rest, only the tooltip (title="")
    // or the "Show full values" toggle reveal it, and the toggle never
    // changes the column width. A blank value is never wrapped in
    // .truncatable at all — there's nothing to truncate. Status (a pill)
    // and Action (icon buttons) are the only columns that stay plain —
    // they're fixed, compact elements, not free-text values that can
    // overflow.
    function truncatableCell(value, modifier) {
      if (!value) return `<span style="color:var(--text-muted)">—</span>`;
      return `<div class="truncatable truncatable--${modifier}" title="${value}"><span class="truncatable-text">${value}</span></div>`;
    }

    tbody.innerHTML = pageItems.length
      ? pageItems
          .map((h) => {
            const loc = resolveHotelLocation(h);
            const countryName = getSystemCountryName(loc.country.code) || loc.country.name;
            const locationSubtitlePlain = `${loc.state ? `${loc.state}, ` : ""}${countryName} (${loc.country.code})`;
            return `
      <tr data-row-id="${h.id}">
        <td>${truncatableCell(getSystemHotelDisplayId(h.id), "id")}</td>
        <td data-col="name">
          <div class="supplier-hotel-cell">
            <button type="button" class="info-icon-btn" data-hotel-name="${h.name}" data-hotel-address="${h.address}" aria-label="View full name & address">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="9" stroke="currentColor" stroke-width="1.6"/><path d="M12 11v5" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/><circle cx="12" cy="8" r="1" fill="currentColor"/></svg>
            </button>
            <div class="supplier-hotel-text">
              <div class="truncatable truncatable--supplierhotel" title="${h.name}">
                <span class="truncatable-text" style="font-weight:600;">${h.name}</span>
              </div>
              <div class="truncatable truncatable--supplierhotel" title="${h.address}" style="margin-top:2px;">
                <span class="truncatable-text" style="font-size:12px; color:var(--text-muted);">${h.address}</span>
              </div>
            </div>
          </div>
        </td>
        <td>
          <div class="location-cell">
            <button type="button" class="info-icon-btn" data-location-city="${loc.city}" data-location-state="${loc.state || "—"}" data-location-country-name="${countryName}" data-location-country-code="${loc.country.code}" aria-label="View full location details">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="9" stroke="currentColor" stroke-width="1.6"/><path d="M12 11v5" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/><circle cx="12" cy="8" r="1" fill="currentColor"/></svg>
            </button>
            <div class="location-text">
              <div class="truncatable truncatable--location" title="${loc.city}">
                <span class="truncatable-text" style="font-weight:600;">${loc.city}</span>
              </div>
              <div class="truncatable truncatable--location" title="${locationSubtitlePlain}" style="margin-top:2px;">
                <span class="truncatable-text" style="font-size:12px; color:var(--text-muted);">${locationSubtitlePlain}</span>
              </div>
            </div>
          </div>
        </td>
        <td>
          <div class="gps-cell">
            <button type="button" class="info-icon-btn" data-gps-lat="${h.latitude}" data-gps-lng="${h.longitude}" aria-label="View full GPS coordinates">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="9" stroke="currentColor" stroke-width="1.6"/><path d="M12 11v5" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/><circle cx="12" cy="8" r="1" fill="currentColor"/></svg>
            </button>
            <div class="gps-text">
              <div class="truncatable truncatable--gps" title="Lat: ${h.latitude}">
                <span class="truncatable-text" style="font-size:12px;"><strong>Lat:</strong> ${h.latitude}</span>
              </div>
              <div class="truncatable truncatable--gps" title="Long: ${h.longitude}" style="margin-top:2px;">
                <span class="truncatable-text" style="font-size:12px;"><strong>Long:</strong> ${h.longitude}</span>
              </div>
            </div>
          </div>
        </td>
        <td>${truncatableCell("⭐".repeat(h.starRating), "starrating")}</td>
        <td>
          <div class="contact-cell">
            <button type="button" class="info-icon-btn" data-contact-email="${h.email || "—"}" data-contact-phone="${h.phoneNumber || "—"}" aria-label="View full contact details">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="9" stroke="currentColor" stroke-width="1.6"/><path d="M12 11v5" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/><circle cx="12" cy="8" r="1" fill="currentColor"/></svg>
            </button>
            <div class="contact-text">
              <div class="truncatable truncatable--contact" title="${h.email || "—"}">
                ${h.email ? `<span class="truncatable-text" style="font-weight:600;">${h.email}</span>` : '<span style="color:var(--text-muted)">—</span>'}
              </div>
              <div class="truncatable truncatable--contact" title="${h.phoneNumber || "—"}" style="margin-top:2px;">
                ${h.phoneNumber ? `<span class="truncatable-text" style="font-size:12px; color:var(--text-muted);">${h.phoneNumber}</span>` : '<span style="font-size:12px; color:var(--text-muted);">—</span>'}
              </div>
            </div>
          </div>
        </td>
        <td>${truncatableCell(h.providerId, "providerid")}</td>
        <td><span class="pill ${h.active ? "success" : "danger"}">${h.active ? "Active" : "Inactive"}</span></td>
        <td>
          <div class="row-actions">
            <button class="action-btn" data-edit-btn data-row-id="${h.id}" aria-label="Edit ${h.name}">
              <svg width="15" height="15" viewBox="0 0 24 24" fill="none"><path d="M16.5 3.5a2.1 2.1 0 013 3L7 19l-4 1 1-4L16.5 3.5z" stroke="currentColor" stroke-width="1.6" stroke-linejoin="round"/></svg>
            </button>
            <button class="action-btn" data-history-btn data-row-id="${h.id}" aria-label="View edit history for ${h.name}">
              <svg width="15" height="15" viewBox="0 0 24 24" fill="none"><path d="M3 12a9 9 0 109-9 9 9 0 00-7 3.3" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/><path d="M3 3.5V8h4.5" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/><path d="M12 7.5V12l3.2 2" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg>
            </button>
            <button class="action-btn" data-toggle-active-btn data-row-id="${h.id}" aria-label="${h.active ? "Deactivate" : "Activate"} ${h.name}">
              <svg width="15" height="15" viewBox="0 0 24 24" fill="none"><path d="M12 2v10" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/><path d="M6 5a8 8 0 106.5-1.5" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/></svg>
            </button>
          </div>
        </td>
      </tr>`;
          })
          .join("")
      : `<tr><td colspan="9" class="empty-state">No hotels found</td></tr>`;

    renderPagination(paginationBar, {
      total: filtered.length,
      page: state.page,
      pageSize: state.pageSize,
      onChange: ({ page, pageSize }) => {
        state.page = page;
        state.pageSize = pageSize;
        render();
      },
    });

    refreshValueOverflowState();
    updateFiltersSummary();
  }

  // Human-readable label + clear-handler for every pending search/filter
  // value — the Name search (+ Fuzzy) in the always-visible row as well as
  // the collapsible panel's fields — keyed the same way they're read in
  // getFiltered() above. Used to build the live summary chips (which track
  // *pending* selections, not necessarily what the table is currently
  // showing — see runSearchNow()) and to let each chip clear just its own
  // field.
  const hotelFiltersToggleBtn = document.getElementById("hotelFiltersToggleBtn");
  const hotelFiltersPanel = document.getElementById("hotelFiltersPanel");
  const hotelFiltersSummary = document.getElementById("hotelFiltersSummary");
  const hotelActiveFilterCount = document.getElementById("hotelActiveFilterCount");

  function activeFilterEntries() {
    const entries = [];
    if (state.query.trim()) entries.push({ key: "query", label: state.fuzzy ? "Name (fuzzy)" : "Name", value: state.query.trim() });
    if (state.idQuery.trim()) entries.push({ key: "idQuery", label: "ID", value: state.idQuery.trim() });
    if (state.providerIdQuery.trim()) entries.push({ key: "providerIdQuery", label: "Provider ID", value: state.providerIdQuery.trim() });
    if (state.country) entries.push({ key: "country", label: "Country", value: state.country });
    if (state.hotelState) entries.push({ key: "hotelState", label: "State", value: state.hotelState });
    if (state.city) entries.push({ key: "city", label: "City", value: state.city });
    if (state.starRating) entries.push({ key: "starRating", label: "Star Rating", value: `${state.starRating} ★` });
    if (state.status !== "all") entries.push({ key: "status", label: "Status", value: state.status === "active" ? "Active" : "Inactive" });
    return entries;
  }

  // Clearing any chip only ever updates `state` + the summary itself, same
  // as typing/selecting does elsewhere on this page — it never touches the
  // table directly, so clearing a chip is consistent with every other
  // pending change (Search/Enter/Reset are still the only things that
  // actually re-query). Select-backed filters reuse that select's own
  // existing change handler (cascading State/City resets,
  // updateCityFilterOptions(), etc.) by resetting its value and dispatching
  // a real "change" event, instead of duplicating that logic here.
  const FILTER_CLEARERS = {
    query: () => {
      state.query = "";
      hotelSearch.value = "";
      updateFiltersSummary();
    },
    idQuery: () => {
      state.idQuery = "";
      hotelIdSearch.value = "";
      updateFiltersSummary();
    },
    providerIdQuery: () => {
      state.providerIdQuery = "";
      hotelProviderIdSearch.value = "";
      updateFiltersSummary();
    },
    country: () => {
      countryFilterSelect.value = "";
      countryFilterSelect.dispatchEvent(new Event("change"));
    },
    hotelState: () => {
      stateFilterSelect.value = "";
      stateFilterSelect.dispatchEvent(new Event("change"));
    },
    city: () => {
      cityFilterSelect.value = "";
      cityFilterSelect.dispatchEvent(new Event("change"));
    },
    starRating: () => {
      starRatingFilterSelect.value = "";
      starRatingFilterSelect.dispatchEvent(new Event("change"));
    },
    status: () => {
      statusFilterSelect.value = "all";
      statusFilterSelect.dispatchEvent(new Event("change"));
    },
  };

  hotelFiltersSummary.addEventListener("click", (e) => {
    const btn = e.target.closest("[data-clear-filter]");
    if (btn) FILTER_CLEARERS[btn.dataset.clearFilter]?.();
  });

  // Called from every field's own change/input handler (so the count pill
  // and, while collapsed, the summary chips update live as soon as you
  // type or pick something) and also once at the end of render() (so a
  // Search/Reset that changed `state` in bulk stays in sync too).
  function updateFiltersSummary() {
    const entries = activeFilterEntries();

    hotelActiveFilterCount.textContent = String(entries.length);
    hotelActiveFilterCount.style.display = entries.length ? "" : "none";

    const isOpen = hotelFiltersPanel.style.display !== "none";
    if (isOpen || !entries.length) {
      hotelFiltersSummary.style.display = "none";
      hotelFiltersSummary.innerHTML = "";
    } else {
      hotelFiltersSummary.style.display = "";
      hotelFiltersSummary.innerHTML = entries
        .map(
          (e) =>
            `<span class="filter-chip">${e.label}: ${e.value}<button type="button" data-clear-filter="${e.key}" aria-label="Clear ${e.label} filter">×</button></span>`
        )
        .join("");
    }
  }

  function setFiltersPanelOpen(open) {
    hotelFiltersPanel.style.display = open ? "grid" : "none";
    hotelFiltersToggleBtn.classList.toggle("open", open);
    hotelFiltersToggleBtn.setAttribute("aria-expanded", String(open));
    updateFiltersSummary();
  }

  hotelFiltersToggleBtn.addEventListener("click", () => {
    setFiltersPanelOpen(hotelFiltersPanel.style.display === "none");
  });

  // Re-measures every .truncatable cell after each render() (search/filter/
  // pagination change) and after the "Show full values" toggle flips —
  // only cells whose content genuinely doesn't fit their fixed width get
  // .is-overflowing (and therefore the fade-out via CSS); a short value
  // that already fits gets no visual treatment at all.
  function refreshValueOverflowState() {
    document.querySelectorAll("#hotelTable .truncatable").forEach((el) => {
      el.classList.toggle("is-overflowing", el.scrollWidth > el.clientWidth + 1);
    });
  }

  revealValuesToggle.addEventListener("change", () => {
    hotelTableEl.classList.toggle("reveal-values", revealValuesToggle.checked);
    refreshValueOverflowState();
  });

  // Nothing here re-filters the table — every field below only updates
  // `state` + the live Filters badge/chip summary (updateFiltersSummary()).
  // The table itself only ever re-queries on runSearchNow() (the Search
  // button or Enter in a search box) or Reset, which both call render()
  // directly. Cascading option population (Country -> State -> City) still
  // happens live here since that's populating the pickers themselves, not
  // filtering the table.
  function runSearchNow() {
    state.page = 1;
    setFiltersPanelOpen(false);
    render();
  }

  hotelSearchBtn.addEventListener("click", runSearchNow);

  function onEnterKey(input, handler) {
    input.addEventListener("keydown", (e) => {
      if (e.key === "Enter") handler();
    });
  }
  onEnterKey(hotelSearch, runSearchNow);
  onEnterKey(hotelIdSearch, runSearchNow);
  onEnterKey(hotelProviderIdSearch, runSearchNow);

  hotelSearch.addEventListener("input", () => {
    state.query = hotelSearch.value;
    updateFiltersSummary();
  });

  hotelFuzzyToggle.addEventListener("change", () => {
    state.fuzzy = hotelFuzzyToggle.checked;
    updateFiltersSummary();
  });

  hotelIdSearch.addEventListener("input", () => {
    state.idQuery = hotelIdSearch.value;
    updateFiltersSummary();
  });

  hotelProviderIdSearch.addEventListener("input", () => {
    state.providerIdQuery = hotelProviderIdSearch.value;
    updateFiltersSummary();
  });

  starRatingFilterSelect.addEventListener("change", () => {
    state.starRating = starRatingFilterSelect.value;
    updateFiltersSummary();
  });

  countryFilterSelect.addEventListener("change", () => {
    state.country = countryFilterSelect.value;
    state.hotelState = "";

    const countryMeta = SYSTEM_COUNTRIES.find((c) => c.name === state.country);
    const states = countryMeta ? getStatesForCountryCode(countryMeta.code) : [];

    if (states.length) {
      stateFilterSelect.disabled = false;
      stateFilterSelect.innerHTML =
        `<option value="">All States</option>` + states.map((s) => `<option value="${s}">${s}</option>`).join("");
    } else {
      stateFilterSelect.disabled = true;
      stateFilterSelect.innerHTML = `<option value="">${countryMeta ? "No state required" : "Select State"}</option>`;
    }
    updateCityFilterOptions();
    updateFiltersSummary();
  });

  stateFilterSelect.addEventListener("change", () => {
    state.hotelState = stateFilterSelect.value;
    updateCityFilterOptions();
    updateFiltersSummary();
  });

  cityFilterSelect.addEventListener("change", () => {
    state.city = cityFilterSelect.value;
    updateFiltersSummary();
  });

  statusFilterSelect.addEventListener("change", () => {
    state.status = statusFilterSelect.value;
    updateFiltersSummary();
  });

  // Reset is the one other action (besides Search/Enter) that touches the
  // table immediately — "start over" should show the unfiltered list right
  // away, not just clear the pending fields and leave stale results shown.
  document.getElementById("resetHotelFilterBtn").addEventListener("click", () => {
    hotelSearch.value = "";
    hotelFuzzyToggle.checked = false;
    hotelIdSearch.value = "";
    hotelProviderIdSearch.value = "";
    countryFilterSelect.value = "";
    stateFilterSelect.disabled = true;
    stateFilterSelect.innerHTML = `<option value="">Select State</option>`;
    starRatingFilterSelect.value = "";
    statusFilterSelect.value = "all";
    state = {
      ...state,
      page: 1,
      query: "",
      fuzzy: false,
      idQuery: "",
      providerIdQuery: "",
      country: "",
      hotelState: "",
      city: "",
      starRating: "",
      status: "all",
    };
    updateCityFilterOptions();
    render();
  });

  updateCityFilterOptions();

  // Deep-linked from city-system.html's "View Hotels" row action
  // (?cityId=X) — pre-fill Country/State/City to that system city and run
  // the search immediately, same as if the user had set those 3 filters
  // and pressed Search themselves. Falls back to the normal unfiltered
  // load when there's no (or an unrecognized) cityId param.
  const deepLinkCityId = new URLSearchParams(window.location.search).get("cityId");
  const deepLinkCity = deepLinkCityId !== null ? SYSTEM_CITIES.find((c) => c.id === Number(deepLinkCityId)) : null;

  if (deepLinkCity) {
    const countryName = getSystemCountryName(deepLinkCity.country.code) || deepLinkCity.country.name;
    countryFilterSelect.value = countryName;
    countryFilterSelect.dispatchEvent(new Event("change"));

    if (deepLinkCity.state) {
      stateFilterSelect.value = deepLinkCity.state;
      stateFilterSelect.dispatchEvent(new Event("change"));
    }

    // Only takes effect if this city actually has a hotel assigned to it —
    // the City select's own options are built from hotels' resolved
    // locations (see updateCityFilterOptions() above), not from
    // SYSTEM_CITIES directly, same as every other use of this filter.
    cityFilterSelect.value = deepLinkCity.name;
    cityFilterSelect.dispatchEvent(new Event("change"));

    runSearchNow();
  } else {
    render();
  }

  // ---------- Row actions: Edit / History / Toggle Active ----------

  document.addEventListener("click", (e) => {
    const hotelBtn = e.target.closest("[data-hotel-name]");
    if (hotelBtn) {
      openDetailPopover(hotelBtn, [
        { label: "Name", value: hotelBtn.dataset.hotelName },
        { label: "Address", value: hotelBtn.dataset.hotelAddress },
      ]);
      return;
    }
    const locationBtn = e.target.closest("[data-location-city]");
    if (locationBtn) {
      openDetailPopover(locationBtn, [
        { label: "City", value: locationBtn.dataset.locationCity },
        { label: "State", value: locationBtn.dataset.locationState },
        { label: "Country", value: locationBtn.dataset.locationCountryName },
        { label: "Country Code", value: locationBtn.dataset.locationCountryCode },
      ]);
      return;
    }
    const gpsBtn = e.target.closest("[data-gps-lat]");
    if (gpsBtn) {
      openDetailPopover(gpsBtn, [
        { label: "Latitude", value: gpsBtn.dataset.gpsLat },
        { label: "Longitude", value: gpsBtn.dataset.gpsLng },
      ]);
      return;
    }
    const contactBtn = e.target.closest("[data-contact-email]");
    if (contactBtn) {
      openDetailPopover(contactBtn, [
        { label: "Email", value: contactBtn.dataset.contactEmail },
        { label: "Phone", value: contactBtn.dataset.contactPhone },
      ]);
      return;
    }

    const editBtn = e.target.closest("[data-edit-btn]");
    if (editBtn) {
      openHotelForm(SYSTEM_HOTELS.find((h) => String(h.id) === editBtn.dataset.rowId));
      return;
    }

    const historyBtn = e.target.closest("[data-history-btn]");
    if (historyBtn) {
      const record = SYSTEM_HOTELS.find((h) => String(h.id) === historyBtn.dataset.rowId);
      if (!record) return;
      document.getElementById("historyHotelName").textContent = `— ${record.name} (ID: ${getSystemHotelDisplayId(record.id)})`;
      showHistoryList(record.history, "No edit history yet");
      openModal(document.getElementById("historyModal"));
      return;
    }

    const toggleBtn = e.target.closest("[data-toggle-active-btn]");
    if (toggleBtn) {
      const record = SYSTEM_HOTELS.find((h) => String(h.id) === toggleBtn.dataset.rowId);
      if (!record) return;
      const wasActive = record.active;
      record.active = !record.active;
      record.history.push({
        operation: "Status Change",
        status: record.active,
        description: `Status: ${wasActive ? "Active" : "Inactive"} -> ${record.active ? "Active" : "Inactive"}`,
        userName: CURRENT_USER.name,
        userEmail: CURRENT_USER.email,
        timestamp: new Date(),
      });
      saveToStorage("SYSTEM_HOTELS", SYSTEM_HOTELS);
      render();
      showToast(`${record.name} marked ${record.active ? "Active" : "Inactive"}`);
    }
  });

  // ---------- Add / Edit Hotel form ----------

  const hotelFormModal = document.getElementById("hotelFormModal");
  const hotelFormTitle = document.getElementById("hotelFormTitle");
  const hotelFormId = document.getElementById("hotelFormId");
  const hotelFormName = document.getElementById("hotelFormName");
  const hotelFormAddress = document.getElementById("hotelFormAddress");
  const hotelFormCountry = document.getElementById("hotelFormCountry");
  const hotelFormState = document.getElementById("hotelFormState");
  const hotelFormCity = document.getElementById("hotelFormCity");
  const hotelFormLatitude = document.getElementById("hotelFormLatitude");
  const hotelFormLongitude = document.getElementById("hotelFormLongitude");
  const hotelFormStarRating = document.getElementById("hotelFormStarRating");
  const hotelFormEmail = document.getElementById("hotelFormEmail");
  const hotelFormPhone = document.getElementById("hotelFormPhone");
  const hotelFormProviderId = document.getElementById("hotelFormProviderId");

  hotelFormCountry.insertAdjacentHTML(
    "beforeend",
    SYSTEM_COUNTRIES.map((c) => `<option value="${c.name}">${c.name} (${c.code})</option>`).join("")
  );

  function populateHotelFormStates(countryName, selectedState) {
    const meta = SYSTEM_COUNTRIES.find((c) => c.name === countryName);
    const states = meta ? getStatesForCountryCode(meta.code) : [];
    if (states.length) {
      hotelFormState.disabled = false;
      hotelFormState.innerHTML =
        `<option value="">Select state</option>` + states.map((s) => `<option value="${s}">${s}</option>`).join("");
      if (selectedState) hotelFormState.value = selectedState;
    } else {
      hotelFormState.disabled = true;
      hotelFormState.innerHTML = `<option value="">${meta ? "No state required" : "Select country first"}</option>`;
    }
  }

  // City is picked from SYSTEM_CITIES (the same master list "Pin a System
  // City" in city-mapping.html uses), not free-typed — country gates the
  // list, state (if the country has one) narrows it further but is never
  // required, matching this project's established "state is an optional
  // extra filter, never gates the load" convention. Prepopulated cities and
  // New City entries are both eligible — a hotel can be directly attached
  // to either. A Merged city is excluded: it has no identity of its own to
  // attach a hotel to, it's only ever a view over its component cities'
  // supplier mappings (see city-system.html's Merge Cities info popup).
  function populateHotelFormCities(countryName, stateValue, selectedCityId) {
    if (!countryName) {
      hotelFormCity.disabled = true;
      hotelFormCity.innerHTML = `<option value="">Select country first</option>`;
      return;
    }
    // Matches by code (stable) rather than the passed-in name, so a city
    // whose country.name snapshot predates a rename on country-system.html
    // is still correctly matched against the country's current name.
    const countryMeta = SYSTEM_COUNTRIES.find((c) => c.name === countryName);
    let candidates = countryMeta ? SYSTEM_CITIES.filter((c) => c.cityType !== "merged" && c.country.code === countryMeta.code) : [];
    if (stateValue) candidates = candidates.filter((c) => c.state === stateValue);
    hotelFormCity.disabled = candidates.length === 0;
    hotelFormCity.innerHTML = candidates.length
      ? `<option value="">Select city</option>` + candidates.map((c) => `<option value="${c.id}">${c.name}${c.state ? ` - ${c.state}` : ""}</option>`).join("")
      : `<option value="">No eligible cities here</option>`;
    if (selectedCityId !== null && selectedCityId !== undefined) {
      hotelFormCity.value = String(selectedCityId);
    }
  }

  hotelFormCountry.addEventListener("change", () => {
    populateHotelFormStates(hotelFormCountry.value, "");
    populateHotelFormCities(hotelFormCountry.value, "", null);
  });

  hotelFormState.addEventListener("change", () => {
    populateHotelFormCities(hotelFormCountry.value, hotelFormState.value, null);
  });

  // Edit-only — there's no Add Hotel flow, so this is always called with a
  // real hotel record and every field is pre-filled from it. Provider Id is
  // locked (disabled) here, same "not editable after creation" rule as Id.
  function openHotelForm(record) {
    hotelFormModal.dataset.activeRow = record.id;
    hotelFormTitle.textContent = "Edit Hotel";

    // Resolved live rather than read off the record's own snapshot, so a
    // rename on city-system.html/country-system.html since this hotel was
    // last saved doesn't leave the Country/City selects unable to match any
    // option (a stale name wouldn't be found among the freshly-populated
    // <option>s below).
    const loc = resolveHotelLocation(record);
    const countryName = getSystemCountryName(loc.country.code) || loc.country.name;

    hotelFormId.value = getSystemHotelDisplayId(record.id);
    hotelFormName.value = record.name;
    hotelFormAddress.value = record.address;
    hotelFormLatitude.value = record.latitude;
    hotelFormLongitude.value = record.longitude;
    hotelFormStarRating.value = String(record.starRating);
    hotelFormEmail.value = record.email || "";
    hotelFormPhone.value = record.phoneNumber || "";
    hotelFormProviderId.value = record.providerId || "";
    hotelFormProviderId.disabled = true;
    hotelFormCountry.value = countryName;
    populateHotelFormStates(countryName, loc.state);
    populateHotelFormCities(countryName, loc.state, record.systemCityId);

    openModal(hotelFormModal);
  }

  document.getElementById("saveHotelBtn").addEventListener("click", () => {
    const name = hotelFormName.value.trim();
    const countryName = hotelFormCountry.value;
    const cityRecord = hotelFormCity.value ? SYSTEM_CITIES.find((c) => c.id === Number(hotelFormCity.value)) : null;
    if (!name) {
      showToast("Hotel name is required", "error");
      return;
    }
    if (!countryName) {
      showToast("Please select a country", "error");
      return;
    }
    if (!cityRecord) {
      showToast("Please select a city", "error");
      return;
    }

    const meta = SYSTEM_COUNTRIES.find((c) => c.name === countryName);
    const city = cityRecord.name;
    const newState = cityRecord.state;
    const systemCityId = cityRecord.id;
    const address = hotelFormAddress.value.trim();
    const latitude = hotelFormLatitude.value === "" ? null : Number(hotelFormLatitude.value);
    const longitude = hotelFormLongitude.value === "" ? null : Number(hotelFormLongitude.value);
    const starRating = Number(hotelFormStarRating.value);
    const email = hotelFormEmail.value.trim();
    const phoneNumber = hotelFormPhone.value.trim();

    // Edit only — build an old -> new changelog only for fields that
    // actually changed, matching this project's history-description
    // convention.
    const rowId = hotelFormModal.dataset.activeRow;
    const record = SYSTEM_HOTELS.find((h) => String(h.id) === String(rowId));
    if (!record) return;

    const changes = [];
    function diff(label, oldVal, newVal) {
      if (oldVal !== newVal) changes.push(`${label}: ${oldVal ?? "—"} -> ${newVal ?? "—"}`);
    }
    // Compare against the resolved-live location, not the raw stored
    // snapshot — otherwise re-saving a hotel whose city/country was
    // renamed elsewhere logs a misleading "you changed City/Country"
    // entry for a change the user never made here.
    const oldLoc = resolveHotelLocation(record);
    const oldCountryName = getSystemCountryName(oldLoc.country.code) || oldLoc.country.name;
    diff("Name", record.name, name);
    diff("Address", record.address, address);
    diff("City", oldLoc.city, city);
    diff("State", oldLoc.state, newState);
    diff("Country", oldCountryName, meta.name);
    diff("Latitude", record.latitude, latitude);
    diff("Longitude", record.longitude, longitude);
    diff("Star Rating", record.starRating, starRating);
    diff("Email", record.email || null, email || null);
    diff("Phone Number", record.phoneNumber || null, phoneNumber || null);
    // Id and Provider Id are intentionally excluded here — both are fixed
    // at creation and not editable, so record.providerId is never
    // reassigned below (hotelFormProviderId is disabled while editing,
    // matching hotelFormId).

    record.name = name;
    record.address = address;
    record.city = city;
    record.state = newState;
    record.country = { name: meta.name, code: meta.code };
    record.systemCityId = systemCityId;
    record.latitude = latitude;
    record.longitude = longitude;
    record.starRating = starRating;
    record.email = email;
    record.phoneNumber = phoneNumber;

    if (changes.length) {
      record.history.push({
        operation: "Edit",
        name,
        description: changes.join(", "),
        userName: CURRENT_USER.name,
        userEmail: CURRENT_USER.email,
        timestamp: new Date(),
      });
    }
    showToast("Hotel updated successfully");

    saveToStorage("SYSTEM_HOTELS", SYSTEM_HOTELS);
    updateCityFilterOptions();
    render();
    hotelFormModal.classList.remove("open");
  });
</script>
</body>
</html>
