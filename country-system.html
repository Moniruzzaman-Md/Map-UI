      <template id="countryListInfo">
        <p>This page manages the <strong>master list of countries</strong> used everywhere else in the system — supplier country mappings and city records both reference these entries.</p>
        <ul>
          <li><strong>Code</strong> — the country's unique identifier (e.g. "US"). Set when the country is added and never changes.</li>
          <li><strong>Edit</strong> — rename a country. The code stays the same.</li>
          <li><strong>Map</strong> — for each supplier, see which of their countries (if any) maps to this system country, with an Unmap option, or pick one to map if none does yet. Reassigning a supplier's country that's already mapped elsewhere asks you to confirm first.</li>
          <li><strong>History</strong> — every name change, and every supplier country mapped, remapped, or unmapped to this country, with who made the change and when.</li>
          <li><strong>Mapping Summary</strong> — see at a glance which suppliers have this country mapped.</li>
          <li><strong>View Cities</strong> — opens the System City List, filtered to this country.</li>
        </ul>
      </template>

      <template id="countryDevNotes">
        <p>This is the master list of countries. Every supplier's own country list maps to one entry here, and city records reference this list too.</p>
        <ul>
          <li><strong>Code is permanent</strong> — set once when the country is added, never editable, and it's what everything else should key off. Only the name can change.</li>
          <li><strong>Edit</strong> — renaming must never break an existing mapping. Either mappings are keyed by the permanent code, or the rename updates every existing mapping in the same step. Empty names must be rejected with a clear error.</li>
          <li><strong>Map</strong> — for each supplier, show either the country(ies) already mapped here (with Unmap), or a picker of that supplier's own countries (with Map). In the picker, any option already mapped to a different country must be labeled with its current target (e.g. "Deutschland (DE) — mapped to Austria") so that's visible before it's picked, not just after. Picking an already-mapped-elsewhere option must show old vs. new and require explicit confirmation before applying — never silent. Logged as a <strong>Remap</strong> (see History below), not a plain Map.</li>
          <li><strong>History</strong> — every entry has three parts: an <strong>operation name</strong>, a <strong>description</strong> in that operation's fixed pattern, and <strong>who + when</strong>. Logged the instant the change happens (never reconstructed later by comparing snapshots), newest entry first. A mapping change always writes to <strong>two</strong> records — the country's own history AND the affected supplier country's own history — no matter which screen made the change.
            <p>When a description needs to show more than one distinct fact — e.g. who made the change, and separately what it changed from/to — separate the facts with a single pipe character <code>|</code>. The history view splits on <code>|</code> and puts each part on its own line, so a card stays easy to scan instead of one dense run-on sentence. Only insert <code>|</code> between genuinely distinct facts, and never for any other purpose — it's reserved as the line-break marker.</p>
            <p><strong>On the country's own record:</strong></p>
            <ul>
              <li><strong>Edit</strong> — the name was changed. Description: <em>Name: {old name} -&gt; {new name}</em></li>
              <li><strong>Map</strong> — a supplier's country became linked to this country for the first time (it had no country before). Description: <em>{Supplier} — {supplier's country name} ({code}) — ID: {supplier's country ID}</em></li>
              <li><strong>Unmap</strong> — a supplier's country that was linked to this country got unlinked entirely, with nothing put in its place. Description: <em>{Supplier} — {supplier's country name} ({code}) — ID: {supplier's country ID}</em></li>
              <li><strong>Remap</strong> — a supplier's country moved between two countries. Both the country it left and the country it moved to log this as one Remap event, never as Unmap on one and Map on the other — and both log the exact same description, so either country's history is understandable on its own. Description: <em>{Supplier} — {supplier's country name} ({code}) — ID: {supplier's country ID}|{old country} ({code}) -&gt; {new country} ({code})</em> (two lines: who, then what changed)</li>
            </ul>
            <p><strong>On the supplier's own country record</strong> (the matching entry for the same event, from its side — always Map/Remap/Unmap, never Edit/Create, which are reserved for renaming a country, not a mapping change):</p>
            <ul>
              <li><strong>Map</strong> — this is the first time this supplier's country has ever been linked to any country. Description: <em>{new country} ({code})</em></li>
              <li><strong>Remap</strong> — an existing link changed to a different country. Description: <em>{old country} ({code}) -&gt; {new country} ({code})</em></li>
              <li><strong>Unmap</strong> — an existing link was removed, with nothing put in its place. Description: <em>{old country} ({code}) -&gt; Not mapped</em></li>
            </ul>
          </li>
          <li><strong>Mapping Summary</strong> — read-only, per-supplier mapped/unmapped overview.</li>
          <li><strong>View Cities</strong> — jumps to the City list filtered by this country's permanent code, not its name.</li>
        </ul>
        <p><strong>Everywhere:</strong> save immediately with clear success/error feedback, confirm before overwriting any existing relationship, and key relationships by permanent code/id — never by an editable name.</p>
      </template>

<script src="js/app.js"></script>
<script src="js/data.js"></script>
<script>
  // A direct reference to the shared master array (js/data.js already
  // seeds its id/history and hydrates it from storage) — NOT a copy, so
  // edits made here actually mutate SYSTEM_COUNTRIES itself and are visible
  // to every other page that reads it (City, Hotel, City Mapping, Country
  // Supplier's filters). An earlier version of this page built its own
  // `.map()`'d copy with a separate "countries" storage key, which silently
  // desynced renames/history from the rest of the project.
  const countries = SYSTEM_COUNTRIES;

  const tbody = document.querySelector("#countryTable tbody");
  const paginationBar = document.getElementById("paginationBar");
  const nameSearchInput = document.getElementById("countryNameSearch");
  const codeSearchInput = document.getElementById("countryCodeSearch");

  let state = { page: 1, pageSize: 10, nameQuery: "", codeQuery: "" };

  function getFiltered() {
    const nameQ = state.nameQuery.trim().toLowerCase();
    const codeQ = state.codeQuery.trim().toLowerCase();
    return countries.filter(
      (c) =>
        (!nameQ || c.name.toLowerCase().includes(nameQ)) &&
        (!codeQ || c.code.toLowerCase().includes(codeQ))
    );
  }

  function render() {
    const filtered = getFiltered();
    const totalPages = Math.max(1, Math.ceil(filtered.length / state.pageSize));
    state.page = Math.min(state.page, totalPages);
    const startIdx = (state.page - 1) * state.pageSize;
    const pageItems = filtered.slice(startIdx, startIdx + state.pageSize);

    tbody.innerHTML = pageItems.length
      ? pageItems
          .map(
            (c) => `
      <tr data-row-id="${c.id}">
        <td data-col="code"><span class="code-badge">${c.code}</span></td>
        <td data-col="name">${c.name}</td>
        <td>
          <div class="row-actions">
            <button class="action-btn" data-modal-target="#editCountryModal" aria-label="Edit ${c.name}">
              <svg width="15" height="15" viewBox="0 0 24 24" fill="none"><path d="M16.5 3.5a2.1 2.1 0 013 3L7 19l-4 1 1-4L16.5 3.5z" stroke="currentColor" stroke-width="1.6" stroke-linejoin="round"/></svg>
            </button>
            <button class="action-btn" data-map-btn data-row-id="${c.id}" aria-label="Map supplier countries to ${c.name}">
              <svg width="15" height="15" viewBox="0 0 24 24" fill="none"><path d="M9 17l-4.5 2V7L9 5m0 12l6 2m-6-2V5m6 14l4.5-2V5L15 7m0 12V7m0 0L9 5" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/></svg>
            </button>
            <button class="action-btn" data-history-btn data-row-id="${c.id}" aria-label="View edit history for ${c.name}">
              <svg width="15" height="15" viewBox="0 0 24 24" fill="none"><path d="M3 12a9 9 0 109-9 9 9 0 00-7 3.3" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/><path d="M3 3.5V8h4.5" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/><path d="M12 7.5V12l3.2 2" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg>
            </button>
            <button class="action-btn" data-summary-btn data-row-id="${c.id}" aria-label="View mapping summary for ${c.name}">
              <svg width="15" height="15" viewBox="0 0 24 24" fill="none"><rect x="3" y="3" width="7" height="7" rx="1.5" stroke="currentColor" stroke-width="1.6"/><rect x="14" y="3" width="7" height="7" rx="1.5" stroke="currentColor" stroke-width="1.6"/><rect x="3" y="14" width="7" height="7" rx="1.5" stroke="currentColor" stroke-width="1.6"/><rect x="14" y="14" width="7" height="7" rx="1.5" stroke="currentColor" stroke-width="1.6"/></svg>
            </button>
            <a class="action-btn" href="city-system.html?country=${c.code}" target="_blank" rel="noopener" aria-label="View cities in ${c.name}">
              <svg width="15" height="15" viewBox="0 0 24 24" fill="none"><path d="M3 21V10l5-3v14M8 21V7l5-4v18M13 21v-9l5 2.5v6.5" stroke="currentColor" stroke-width="1.6" stroke-linejoin="round"/><path d="M3 21h18" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/></svg>
            </a>
          </div>
        </td>
      </tr>`
          )
          .join("")
      : `<tr><td colspan="3" style="text-align:center; color:var(--text-muted); padding:28px;">No countries found</td></tr>`;

    renderPagination(paginationBar, {
      total: filtered.length,
      page: state.page,
      pageSize: state.pageSize,
      onChange: ({ page, pageSize }) => {
        state.page = page;
        state.pageSize = pageSize;
        render();
      },
    });
  }

  // Typing alone never re-queries the table — only Search (or Enter in
  // either box) or Reset does, so a half-typed query never flashes a
  // filtered/empty list.
  function runSearchNow() {
    state.nameQuery = nameSearchInput.value;
    state.codeQuery = codeSearchInput.value;
    state.page = 1;
    render();
  }

  function onEnterKey(input, handler) {
    input.addEventListener("keydown", (e) => {
      if (e.key === "Enter") handler();
    });
  }

  document.getElementById("countrySearchBtn").addEventListener("click", runSearchNow);
  onEnterKey(nameSearchInput, runSearchNow);
  onEnterKey(codeSearchInput, runSearchNow);

  document.getElementById("resetCountryFilterBtn").addEventListener("click", () => {
    nameSearchInput.value = "";
    codeSearchInput.value = "";
    state.nameQuery = "";
    state.codeQuery = "";
    state.page = 1;
    render();
  });

  render();

  document.getElementById("saveCountryBtn").addEventListener("click", () => {
    const modal = document.getElementById("editCountryModal");
    const rowId = modal.dataset.activeRow;
    const newName = document.getElementById("countryName").value.trim();
    if (!newName) {
      showToast("Country name is required", "error");
      return;
    }
    if (rowId === "") return;
    const record = countries.find((c) => String(c.id) === String(rowId));
    if (record && record.name !== newName) {
      const oldName = record.name;
      record.name = newName;
      record.history.push({
        operation: "Edit",
        name: newName,
        description: `Name: ${oldName} -> ${newName}`,
        userName: CURRENT_USER.name,
        userEmail: CURRENT_USER.email,
        timestamp: new Date(),
      });

      // Supplier country mappings reference a system country by its NAME
      // (supplierCountries[key][*].systemCountry — see country-supplier.html),
      // not a stable id/code, so a rename here would otherwise silently
      // orphan every existing mapping (its pre-fill wouldn't match any
      // <option>, its table cell would keep showing the old name, and an
      // accidental re-save could even unmap it). Cascade the rename into
      // every supplier's rows so the mapping stays intact.
      Object.keys(supplierCountries).forEach((key) => {
        supplierCountries[key].forEach((row) => {
          if (row.systemCountry === oldName) row.systemCountry = newName;
        });
      });
      saveToStorage("supplierCountries", supplierCountries);
    }
    saveToStorage("SYSTEM_COUNTRIES", SYSTEM_COUNTRIES);
    render();
    modal.classList.remove("open");
    showToast("Country updated successfully");
  });

  document.addEventListener("click", (e) => {
    const btn = e.target.closest("[data-history-btn]");
    if (!btn) return;
    const record = countries.find((c) => String(c.id) === btn.dataset.rowId);
    if (!record) return;

    document.getElementById("historyCountryName").textContent = `— ${record.name} (${record.code})`;
    showHistoryList(record.history, "No edit history yet");

    openModal(document.getElementById("historyModal"));
  });

  document.addEventListener("click", (e) => {
    const btn = e.target.closest("[data-summary-btn]");
    if (!btn) return;
    const record = countries.find((c) => String(c.id) === btn.dataset.rowId);
    if (!record) return;

    document.getElementById("summaryCountryName").textContent = `— ${record.name}`;
    const summaryList = document.getElementById("summaryList");
    const rows = getMappingSummary(record.name);
    summaryList.innerHTML = rows
      .map(
        (r) => `
      <div class="history-entry">
        <div class="history-entry-label">${r.supplierLabel}</div>
        <div class="history-card">
          <table>
            <tbody>
              <tr>
                <td class="history-row-label">Status</td>
                <td class="history-row-sep">:</td>
                <td class="history-row-value">${
                  r.mapped ? '<span class="text-mapped">Mapped</span>' : '<span class="text-not-mapped">Not mapped</span>'
                }</td>
              </tr>
              ${
                r.mapped
                  ? `
              <tr>
                <td class="history-row-label">Supplier Country</td>
                <td class="history-row-sep">:</td>
                <td class="history-row-value">${r.countryName}</td>
              </tr>
              <tr>
                <td class="history-row-label">Country ID</td>
                <td class="history-row-sep">:</td>
                <td class="history-row-value">${r.countryId}</td>
              </tr>`
                  : ""
              }
            </tbody>
          </table>
        </div>
      </div>`
      )
      .join("");

    openModal(document.getElementById("summaryModal"));
  });

  // ---------- Map Supplier Countries (bulk, one checklist per supplier) ----------

  function formatSystemCountryLabel(name) {
    return `${name} (${SYSTEM_COUNTRY_CODES[name] || "-"})`;
  }

  let mapCountriesActiveRecord = null;

  document.addEventListener("click", (e) => {
    const btn = e.target.closest("[data-map-btn]");
    if (!btn) return;
    const record = countries.find((c) => String(c.id) === btn.dataset.rowId);
    if (!record) return;

    mapCountriesActiveRecord = record;
    document.getElementById("mapCountriesSystemName").textContent = `— ${record.name}`;
    renderMapCountriesBody();
    openModal(document.getElementById("mapCountriesModal"));
  });

  // Applies (or clears) one supplier country's systemCountry and logs it,
  // same changelog convention as the existing per-row Map Country modal on
  // country-supplier.html — then re-renders so that supplier's section
  // switches live between "mapped, offer Unmap" and "picker, offer Map".
  // Logs from BOTH sides, same reasoning as applyMapping() for cities in
  // js/data.js: the supplier country has one evolving value (systemCountry),
  // logged as Map (first time set), Remap (changed to a different country),
  // or Unmap (cleared) — never Edit/Create, which are reserved for entity
  // property changes (e.g. renaming), not mapping actions. The system
  // country instead gets additive/removal log lines (Map/Unmap) on
  // whichever country(ies) actually gained/lost this supplier country,
  // since — even though it's one-or-zero-per-supplier in practice — it can
  // still be the target of several different suppliers' countries over time.
  function applyCountryMapping(supplierKey, row, newSystemCountry) {
    const oldValue = row.systemCountry;
    if (oldValue === newSystemCountry) return;
    const supplierCountryLabel = `${SUPPLIER_LABELS[supplierKey]} — ${row.name} (${row.code}) — ID: ${row.supplierId}`;

    row.systemCountry = newSystemCountry;
    row.history.push({
      operation: !oldValue ? "Map" : newSystemCountry ? "Remap" : "Unmap",
      systemCountry: newSystemCountry,
      description: newSystemCountry
        ? oldValue
          ? `${getSystemCountryNameWithCode(oldValue)} -> ${getSystemCountryNameWithCode(newSystemCountry)}`
          : `${getSystemCountryNameWithCode(newSystemCountry)}`
        : `${getSystemCountryNameWithCode(oldValue)} -> Not mapped`,
      userName: CURRENT_USER.name,
      userEmail: CURRENT_USER.email,
      timestamp: new Date(),
    });

    // A remap (oldValue AND newSystemCountry both present) is one event
    // touching two country records, not two independent actions — both
    // sides log it as Remap, not Unmap/Map, so the audit trail reads as
    // "this supplier country moved" rather than two unrelated changes.
    const isRemap = Boolean(oldValue) && Boolean(newSystemCountry);
    // On a genuine remap, both affected countries' own history must say
    // exactly where the supplier country moved from and to (not just that
    // it changed) — same "old -> new" convention as the supplier country's
    // own "old -> new" changelog above, appended so either country's
    // history is legible on its own without cross-referencing the other.
    // HISTORY_LINE_BREAK (js/app.js) puts this on its own line instead of
    // cramming the "who" and the "old -> new" into one dense sentence.
    const remapSuffix = isRemap ? `${HISTORY_LINE_BREAK}${getSystemCountryNameWithCode(oldValue)} -> ${getSystemCountryNameWithCode(newSystemCountry)}` : "";

    if (oldValue) {
      const oldCountry = countries.find((c) => c.name === oldValue);
      if (oldCountry) {
        oldCountry.history.push({
          operation: isRemap ? "Remap" : "Unmap",
          description: `${supplierCountryLabel}${remapSuffix}`,
          userName: CURRENT_USER.name,
          userEmail: CURRENT_USER.email,
          timestamp: new Date(),
        });
      }
    }
    if (newSystemCountry) {
      const newCountry = countries.find((c) => c.name === newSystemCountry);
      if (newCountry) {
        newCountry.history.push({
          operation: isRemap ? "Remap" : "Map",
          description: `${supplierCountryLabel}${remapSuffix}`,
          userName: CURRENT_USER.name,
          userEmail: CURRENT_USER.email,
          timestamp: new Date(),
        });
      }
    }

    saveToStorage("supplierCountries", supplierCountries);
    saveToStorage("SYSTEM_COUNTRIES", SYSTEM_COUNTRIES);
    renderMapCountriesBody();
  }

  function renderMapCountriesBody() {
    const body = document.getElementById("mapCountriesBody");
    body.innerHTML = Object.keys(SUPPLIER_LABELS)
      .map((key) => {
        const rows = supplierCountries[key] || [];
        const matches = rows.filter((r) => r.systemCountry === mapCountriesActiveRecord.name);

        const sectionHtml = matches.length
          ? `<div class="merge-list">${matches
              .map(
                (r) => `
          <div class="merge-list-item">
            <span class="meta">
              <span>${r.name} <span class="code-badge">${r.code}</span></span>
              <span class="sub">${r.supplierId}</span>
            </span>
            <button class="btn btn-secondary" data-unmap-country-supplier="${key}" data-unmap-country-id="${r.id}">Unmap</button>
          </div>`
              )
              .join("")}</div>`
          : rows.length
          ? `<div style="display:flex; gap:8px; align-items:center;">
              <select class="filter-select" data-map-country-select="${key}" style="flex:1; min-width:0;">
                <option value="">Select ${SUPPLIER_LABELS[key]} country</option>
                ${rows
                  .map(
                    (r) =>
                      `<option value="${r.id}">${r.name} (${r.code})${
                        r.systemCountry ? ` — mapped to ${r.systemCountry}` : ""
                      }</option>`
                  )
                  .join("")}
              </select>
              <button class="btn btn-primary" data-map-country-btn="${key}">Map</button>
            </div>`
          : `<div class="empty-state">No countries for this supplier</div>`;

        return `
    <div class="form-group">
      <label>${SUPPLIER_LABELS[key]}</label>
      ${sectionHtml}
    </div>`;
      })
      .join("");

    body.querySelectorAll("[data-unmap-country-supplier]").forEach((btn) => {
      btn.addEventListener("click", () => {
        const supplierKey = btn.dataset.unmapCountrySupplier;
        const id = Number(btn.dataset.unmapCountryId);
        const row = (supplierCountries[supplierKey] || []).find((r) => r.id === id);
        if (!row) return;
        showConfirm(
          `<p style="margin:0;">Unmap <strong>${row.name}</strong> (${SUPPLIER_LABELS[supplierKey]}) from <strong>${mapCountriesActiveRecord.name}</strong>?</p>`,
          () => {
            applyCountryMapping(supplierKey, row, null);
            showToast(`${row.name} unmapped`);
          }
        );
      });
    });

    body.querySelectorAll("[data-map-country-btn]").forEach((btn) => {
      btn.addEventListener("click", () => {
        const supplierKey = btn.dataset.mapCountryBtn;
        const select = body.querySelector(`[data-map-country-select="${supplierKey}"]`);
        const id = select.value === "" ? null : Number(select.value);
        if (id === null) {
          showToast("Please select a country first", "error");
          return;
        }
        const row = (supplierCountries[supplierKey] || []).find((r) => r.id === id);
        if (!row) return;

        if (row.systemCountry && row.systemCountry !== mapCountriesActiveRecord.name) {
          const mappedElsewhere = row.systemCountry;
          showConfirm(
            `
            <div class="remap-subject"><strong>${row.name}</strong> <span class="code-badge">${row.code}</span> is already mapped. Remap it?</div>
            <div class="remap-compare">
              <div class="remap-box">
                <div class="remap-box-label">Currently mapped to</div>
                <div class="remap-box-value">${formatSystemCountryLabel(mappedElsewhere)}</div>
              </div>
              <div class="remap-arrow" aria-hidden="true">&rarr;</div>
              <div class="remap-box remap-box-target">
                <div class="remap-box-label">Will map to</div>
                <div class="remap-box-value">${formatSystemCountryLabel(mapCountriesActiveRecord.name)}</div>
              </div>
            </div>
            `,
            () => {
              applyCountryMapping(supplierKey, row, mapCountriesActiveRecord.name);
              showToast(`${row.name} mapped to ${mapCountriesActiveRecord.name}`);
            }
          );
          return;
        }

        applyCountryMapping(supplierKey, row, mapCountriesActiveRecord.name);
        showToast(`${row.name} mapped to ${mapCountriesActiveRecord.name}`);
      });
    });
  }

  // ---------- Confirm dialog (generic, mirrors city-mapping.html) ----------

  let pendingConfirmAction = null;

  function showConfirm(html, onConfirm) {
    document.getElementById("confirmMessage").innerHTML = html;
    pendingConfirmAction = onConfirm;
    openModal(document.getElementById("confirmModal"));
  }

  document.getElementById("confirmActionBtn").addEventListener("click", () => {
    const action = pendingConfirmAction;
    pendingConfirmAction = null;
    closeModal(document.getElementById("confirmModal"));
    if (action) action();
  });
</script>
</body>
</html>
