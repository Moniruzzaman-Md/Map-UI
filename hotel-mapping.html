    <!-- Main content -->
    <main class="main-content" id="hotelMappingMain">
      <div class="page-header">
        <div class="page-title-row">
          <h1 class="page-title">Hotel Mapping to New City</h1>
          <button class="info-icon-btn" data-info-target="#hotelMappingInfo" data-info-title="Hotel Mapping to New City" aria-label="About this page">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="9" stroke="currentColor" stroke-width="1.6"/><path d="M12 11v5" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/><circle cx="12" cy="8" r="1" fill="currentColor"/></svg>
          </button>
        </div>
      </div>
      <hr class="page-divider" />

      <template id="hotelMappingInfo">
        <p>Maps <strong>system hotels</strong> to a New City. Unlike every other mapping in this project, a hotel can be mapped to more than one city — there's no "remap" here, just check to map and uncheck to unmap.</p>
        <ul>
          <li>Filter by Country/State/City to narrow down the hotel list — these filter the hotel's own location, not the pinned city. The hotel checklist stays empty until a <strong>City</strong> is chosen (State is optional) — the full hotel list can run into the millions, so nothing loads until it's narrowed to one city.</li>
          <li>On the left, <strong>Already Mapped</strong> lists hotels currently mapped to this city — its <strong>Unmap</strong> button queues a removal without the row disappearing, so you can change your mind (the button becomes <strong>Undo</strong>) right up until Save. <strong>New Selection</strong> lists your fresh picks from the checklist on the right.</li>
          <li><strong>Show only unmapped</strong> hides hotels already mapped to this city, so you can see what's still available.</li>
          <li><strong>Save Mapping</strong> always opens a preview first — Previously Saved, New Map, and Unmap — before applying anything, and logs a Map/Unmap entry on both the hotel's and this city's History.</li>
          <li>Tick <strong>"Full Screen"</strong> (top-right) to hide the page title too, giving the hotel checklist the entire screen.</li>
        </ul>
      </template>

      <div class="mapping-nav-fabs">
        <button type="button" class="mapping-nav-fab mapping-chrome-toggle" id="hotelMappingChromeToggleBtn" aria-label="Hide page title for full-height checklist">
          <svg class="icon-expand" width="16" height="16" viewBox="0 0 24 24" fill="none"><path d="M4 9V4h5M20 9V4h-5M4 15v5h5M20 15v5h-5" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
          <svg class="icon-collapse" width="16" height="16" viewBox="0 0 24 24" fill="none"><path d="M9 4v5H4M15 4v5h5M9 20v-5H4M15 20v-5h5" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
          <span>Full Screen</span>
        </button>
      </div>

      <section class="mapping-panel" style="flex:1; min-height:0;">

            <!-- Left: pinned city + Already Mapped / New Selection — both
                 contained to their own content height (not stretched to
                 match the right column; the right checklist is the one
                 that should fill the page, starting at the same top edge
                 as this column instead of below a full-width city card). -->
            <div class="mapping-bottom-col">
              <div class="pinned-city-card" id="pinnedCityCard" style="margin-top:0;">
                <div class="pinned-city-name" id="pinnedCityName"></div>
                <div class="pinned-city-meta" id="pinnedCityMeta"></div>
                <div class="pinned-city-actions">
                  <span class="pill neutral" id="pinnedCityMappedCount">0 mapped</span>
                  <button class="action-btn" id="pinnedCityHistoryBtn" aria-label="View history for this city">
                    <svg width="15" height="15" viewBox="0 0 24 24" fill="none"><path d="M3 12a9 9 0 109-9 9 9 0 00-7 3.3" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/><path d="M3 3.5V8h4.5" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/><path d="M12 7.5V12l3.2 2" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg>
                  </button>
                </div>
              </div>
              <div class="form-group mapping-list-contained" style="margin-top:16px;">
                <label>Selected Hotels</label>
                <div class="merge-list">
                  <details class="mapping-collapsible-inline" open>
                    <summary class="mapping-collapsible-header mapping-collapsible-header--warning">
                      <span>Already Mapped (<span id="hotelAlreadyMappedCount">0</span>)</span>
                      <svg class="chevron" width="14" height="14" viewBox="0 0 24 24" fill="none"><path d="M6 9l6 6 6-6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
                    </summary>
                    <div id="hotelAlreadyMappedList"></div>
                  </details>
                  <details class="mapping-collapsible-inline" open>
                    <summary class="mapping-collapsible-header mapping-collapsible-header--info">
                      <span>New Selection (<span id="hotelNewSelectionCount">0</span>)</span>
                      <svg class="chevron" width="14" height="14" viewBox="0 0 24 24" fill="none"><path d="M6 9l6 6 6-6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
                    </summary>
                    <div id="hotelNewSelectionList"></div>
                  </details>
                </div>
              </div>
            </div>

            <!-- Right: filters + checklist -->
            <div class="mapping-bottom-col">
              <div class="toolbar-filters" style="margin-bottom:12px;">
                <select class="filter-select" id="hotelMapCountryFilter">
                  <option value="">Select country</option>
                </select>
                <select class="filter-select" id="hotelMapStateFilter" disabled>
                  <option value="">All States</option>
                </select>
                <select class="filter-select" id="hotelMapCityFilter" disabled>
                  <option value="">All Cities</option>
                </select>
              </div>

              <div class="mapping-header-row" style="display:flex; justify-content:space-between; align-items:center; margin-bottom:16px;">
                <label class="toggle-row" for="hotelMapUnmappedOnlyToggle" style="margin-bottom:0;">
                  <input type="checkbox" id="hotelMapUnmappedOnlyToggle" />
                  Show only unmapped
                </label>
                <span class="hint" id="hotelMapMappedStat" style="margin-top:0;">Mapped: 0/0</span>
              </div>

              <div class="form-group mapping-list-group">
                <div class="mapping-search-actions-row" style="margin-bottom:6px;">
                  <label style="margin-bottom:0;">Hotels</label>
                  <span class="mapping-save-summary" id="hotelMapSelectionSummary">No pending changes</span>
                </div>
                <div class="mapping-search-actions-row">
                  <div class="toolbar-search mapping-search-half">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none"><circle cx="11" cy="11" r="7" stroke="currentColor" stroke-width="2"/><path d="M21 21l-4.35-4.35" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
                    <input type="text" id="hotelMapSearch" placeholder="Search by hotel name..." />
                  </div>
                  <button class="btn btn-primary" id="saveHotelMappingBtn">Save Mapping</button>
                </div>
                <div class="merge-list" id="hotelMapList"></div>
              </div>
            </div>
          </div>
        </div>

<!-- Save preview: 3 sections (no Remap bucket — a hotel can map to many
     cities, so every new pick is unambiguously "New," never a reassignment).
     Reuses the same .popup-box-lg + #previewSections-style layout
     city-mapping.html's own Save preview uses. -->
<div class="modal-overlay popup-overlay" id="hotelMappingPreviewModal">
  <div class="popup-box popup-box-lg">
    <div class="modal-header">
      <h3>Review Hotel Mapping Changes</h3>
      <button class="modal-close" data-modal-close aria-label="Close">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none"><path d="M6 6l12 12M18 6L6 18" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
      </button>
    </div>
    <div class="modal-body">
      <div id="previewSections"></div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" data-modal-close>Cancel</button>
      <button class="btn btn-primary" id="hotelPreviewConfirmBtn">Confirm &amp; Save</button>
    </div>
  </div>
</div>

<script src="js/app.js"></script>
<script src="js/data.js"></script>
<script>
  const params = new URLSearchParams(window.location.search);
  const pinnedCityId = Number(params.get("cityId"));
  const pinnedCity = SYSTEM_CITIES.find((c) => c.id === pinnedCityId && c.cityType === "normal");

  const countryFilterSelect = document.getElementById("hotelMapCountryFilter");
  const stateFilterSelect = document.getElementById("hotelMapStateFilter");
  const cityFilterSelect = document.getElementById("hotelMapCityFilter");
  const unmappedOnlyToggle = document.getElementById("hotelMapUnmappedOnlyToggle");
  const mappedStat = document.getElementById("hotelMapMappedStat");
  const searchInput = document.getElementById("hotelMapSearch");
  const hotelMapList = document.getElementById("hotelMapList");
  const alreadyMappedList = document.getElementById("hotelAlreadyMappedList");
  const alreadyMappedCount = document.getElementById("hotelAlreadyMappedCount");
  const newSelectionList = document.getElementById("hotelNewSelectionList");
  const newSelectionCount = document.getElementById("hotelNewSelectionCount");
  const selectionSummary = document.getElementById("hotelMapSelectionSummary");

  // "Full Screen" toggle — hides the title/divider so the checklist can
  // claim that space too. Scoped to #hotelMappingMain (this page's own
  // <main> id) so it can't leak into any other page. Same mechanism as
  // city-mapping.html's own toggle, but simpler: this page has one panel
  // already sized by plain flex:1, so there's no section height to
  // recompute after the title disappears.
  const hotelMappingMain = document.getElementById("hotelMappingMain");
  const hotelMappingChromeToggleBtn = document.getElementById("hotelMappingChromeToggleBtn");
  hotelMappingChromeToggleBtn.addEventListener("click", () => {
    const hidden = !hotelMappingMain.classList.contains("chrome-hidden");
    hotelMappingMain.classList.toggle("chrome-hidden", hidden);
    hotelMappingChromeToggleBtn.classList.toggle("active", hidden);
    hotelMappingChromeToggleBtn.querySelector("span").textContent = hidden ? "Exit Full Screen" : "Full Screen";
    hotelMappingChromeToggleBtn.setAttribute("aria-label", hidden ? "Show page title" : "Hide page title for full-height checklist");
  });

  if (!pinnedCity) {
    // A live-created New City only exists in localStorage — some browsers
    // (Firefox) partition that per file:// document, so a fresh New City's
    // Map link can silently fail to resolve when the project is opened as
    // local files instead of served over http. Doesn't affect a real
    // deployment (one shared http origin) or the pre-seeded demo cities.
    document.getElementById("hotelMappingBody").innerHTML = `<div class="empty-state">No New City found for this link. If you just created this city, make sure you're testing over http:// (not file://) or using Chrome/Edge — Firefox partitions local-file storage per page, so a brand-new city's data may not carry over yet. Otherwise, go back to the System City List and use a New City's Map button.</div>`;
  } else {
    document.getElementById("pinnedCityName").textContent = pinnedCity.name;
    document.getElementById("pinnedCityMeta").textContent = [pinnedCity.state, getSystemCountryName(pinnedCity.country.code) || pinnedCity.country.name]
      .filter(Boolean)
      .join(", ");

    document.getElementById("pinnedCityHistoryBtn").addEventListener("click", () => {
      document.getElementById("historyCityName").textContent = `— ${pinnedCity.name} (ID: ${getSystemCityDisplayId(pinnedCity.id)})`;
      showHistoryList(pinnedCity.history, "No history yet");
      openModal(document.getElementById("historyModal"));
    });

    SYSTEM_COUNTRIES.forEach((c) => {
      countryFilterSelect.insertAdjacentHTML("beforeend", `<option value="${c.name}">${c.name} (${c.code})</option>`);
    });

    const state = { country: "", hotelState: "", city: "", query: "" };
    const initialMappedIds = new Set(SYSTEM_HOTELS.filter((h) => (h.mappedCityIds || []).includes(pinnedCityId)).map((h) => h.id));
    const pendingChecked = new Set(initialMappedIds);

    function updatePinnedCount() {
      document.getElementById("pinnedCityMappedCount").textContent = `${initialMappedIds.size} mapped`;
    }

    function hotelMetaSub(h) {
      const loc = resolveHotelLocation(h);
      const address = [loc.state, getSystemCountryName(loc.country.code) || loc.country.name].filter(Boolean).join(", ");
      return `${loc.city}${address ? `, ${address}` : ""}`;
    }

    function candidatesForFilters() {
      let rows = SYSTEM_HOTELS;
      if (state.country)
        rows = rows.filter((h) => (getSystemCountryName(resolveHotelLocation(h).country.code) || resolveHotelLocation(h).country.name) === state.country);
      if (state.hotelState) rows = rows.filter((h) => resolveHotelLocation(h).state === state.hotelState);
      if (state.city) rows = rows.filter((h) => resolveHotelLocation(h).city === state.city);
      return rows;
    }

    function updateStateFilterOptions() {
      let candidates = SYSTEM_HOTELS;
      if (state.country)
        candidates = candidates.filter((h) => (getSystemCountryName(resolveHotelLocation(h).country.code) || resolveHotelLocation(h).country.name) === state.country);
      const states = [...new Set(candidates.map((h) => resolveHotelLocation(h).state).filter(Boolean))].sort();
      stateFilterSelect.innerHTML = `<option value="">All States</option>` + states.map((s) => `<option value="${s}">${s}</option>`).join("");
      stateFilterSelect.disabled = !state.country || states.length === 0;
    }

    function updateCityFilterOptions() {
      const candidates = candidatesForFilters();
      const cities = [...new Set(candidates.map((h) => resolveHotelLocation(h).city))].sort();
      cityFilterSelect.innerHTML = `<option value="">All Cities</option>` + cities.map((c) => `<option value="${c}">${c}</option>`).join("");
      cityFilterSelect.disabled = !state.country || cities.length === 0;
    }

    // "Mapped: n/x" is scoped to country/state only (not city/search/toggle),
    // same rule-14 convention used elsewhere: a stat shouldn't shift with the
    // very filter it's describing. Still gated behind a City pick (see
    // renderHotelList below) — a real hotel table can run into the millions,
    // so nothing scans it, not even for a count, until narrowed to one city.
    function updateMappedStat() {
      if (!state.city) {
        mappedStat.textContent = "";
        return;
      }
      let rows = SYSTEM_HOTELS;
      if (state.country)
        rows = rows.filter((h) => (getSystemCountryName(resolveHotelLocation(h).country.code) || resolveHotelLocation(h).country.name) === state.country);
      if (state.hotelState) rows = rows.filter((h) => resolveHotelLocation(h).state === state.hotelState);
      const mappedCount = rows.filter((h) => pendingChecked.has(h.id)).length;
      mappedStat.textContent = `Mapped: ${mappedCount}/${rows.length}`;
    }

    // The hotel checklist only ever renders once a City is picked (Country
    // and State alone aren't enough) — a real hotel table can run into the
    // millions, so nothing gets queried/rendered here until the filter is
    // narrow enough to be a reasonable result set. Search and "Show only
    // unmapped" are disabled until then too, since there's nothing yet for
    // them to act on.
    unmappedOnlyToggle.disabled = true;
    searchInput.disabled = true;

    function renderHotelList() {
      updateMappedStat();
      unmappedOnlyToggle.disabled = !state.city;
      searchInput.disabled = !state.city;
      if (!state.city) {
        hotelMapList.innerHTML = `<div class="empty-state">Select a country and city to see hotels — hotel lists can run into the millions, so nothing loads until narrowed to one city.</div>`;
        return;
      }
      let rows = candidatesForFilters();
      const q = state.query.trim().toLowerCase();
      if (q) rows = rows.filter((h) => h.name.toLowerCase().includes(q));
      // Hide only rows that are "previously saved and still mapped" — a
      // freshly-checked hotel (pending New Map) or one just unchecked
      // (pending Unmap) must stay visible, since hiding it here would make
      // it impossible to review or undo that pending change from this list.
      if (unmappedOnlyToggle.checked) rows = rows.filter((h) => !(initialMappedIds.has(h.id) && pendingChecked.has(h.id)));

      hotelMapList.innerHTML = rows.length
        ? rows
            .map(
              (h) => `
      <label class="merge-list-item ${h.active ? "merge-list-item--hotel-active" : "merge-list-item--hotel-inactive"}" title="${h.active ? "Active" : "Inactive"}">
        <input type="checkbox" data-hotel-id="${h.id}" ${pendingChecked.has(h.id) ? "checked" : ""} />
        <span class="meta">
          <span class="merge-list-name" title="${h.name}">${h.name}</span>
          <span class="sub">${hotelMetaSub(h)}</span>
        </span>
      </label>`
            )
            .join("")
        : `<div class="empty-state">No hotels match this filter</div>`;

      hotelMapList.querySelectorAll("[data-hotel-id]").forEach((checkbox) => {
        checkbox.addEventListener("change", () => {
          const id = Number(checkbox.dataset.hotelId);
          if (checkbox.checked) pendingChecked.add(id);
          else pendingChecked.delete(id);
          updateMappedStat();
          renderSelectedHotelsList();
          updateSelectionSummary();
        });
      });
    }

    // ---------- Left column: Already Mapped / New Selection ----------

    function renderSelectedHotelsList() {
      const alreadyMappedRows = [...initialMappedIds].map((id) => SYSTEM_HOTELS.find((h) => h.id === id)).filter(Boolean);
      const newSelectionRows = [...pendingChecked]
        .filter((id) => !initialMappedIds.has(id))
        .map((id) => SYSTEM_HOTELS.find((h) => h.id === id))
        .filter(Boolean);

      renderAlreadyMappedSection(alreadyMappedRows);
      renderNewSelectionSection(newSelectionRows);
    }

    function renderAlreadyMappedSection(rows) {
      alreadyMappedCount.textContent = rows.length;
      alreadyMappedList.innerHTML = rows.length
        ? rows
            .map((h) => {
              // Still checked = still mapped (offer Unmap); unchecked here
              // means the user already queued it for unmap this session
              // (offer Undo instead) — reversible without the row ever
              // leaving the list, same pattern as city-mapping.html.
              const queuedForUnmap = !pendingChecked.has(h.id);
              return `
      <div class="merge-list-item">
        <span class="meta">
          <span class="merge-list-name" title="${h.name}">${h.name}</span>
          <span class="sub">${hotelMetaSub(h)}</span>
        </span>
        <div class="row-actions">
          <button class="btn btn-secondary btn-compact" data-toggle-unmap-id="${h.id}">${queuedForUnmap ? "Undo" : "Unmap"}</button>
        </div>
      </div>`;
            })
            .join("")
        : `<div class="empty-state">No hotels mapped yet</div>`;

      alreadyMappedList.querySelectorAll("[data-toggle-unmap-id]").forEach((btn) => {
        btn.addEventListener("click", () => {
          const id = Number(btn.dataset.toggleUnmapId);
          if (pendingChecked.has(id)) pendingChecked.delete(id);
          else pendingChecked.add(id);
          renderHotelList();
          renderSelectedHotelsList();
          updateSelectionSummary();
        });
      });
    }

    function renderNewSelectionSection(rows) {
      newSelectionCount.textContent = rows.length;
      newSelectionList.innerHTML = rows.length
        ? rows
            .map(
              (h) => `
      <div class="merge-list-item">
        <span class="meta">
          <span class="merge-list-name" title="${h.name}">${h.name} <span class="pill info pill-tag">New</span></span>
          <span class="sub">${hotelMetaSub(h)}</span>
        </span>
        <div class="row-actions">
          <button class="action-btn" data-deselect-hotel-id="${h.id}" aria-label="Remove ${h.name} from selection">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none"><path d="M6 6l12 12M18 6L6 18" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>
          </button>
        </div>
      </div>`
            )
            .join("")
        : `<div class="empty-state">No new hotels selected yet</div>`;

      newSelectionList.querySelectorAll("[data-deselect-hotel-id]").forEach((btn) => {
        btn.addEventListener("click", () => {
          pendingChecked.delete(Number(btn.dataset.deselectHotelId));
          renderHotelList();
          renderSelectedHotelsList();
          updateSelectionSummary();
        });
      });
    }

    function updateSelectionSummary() {
      const added = [...pendingChecked].filter((id) => !initialMappedIds.has(id)).length;
      const removed = [...initialMappedIds].filter((id) => !pendingChecked.has(id)).length;
      const parts = [];
      if (added) parts.push(`${added} to map`);
      if (removed) parts.push(`${removed} to unmap`);
      selectionSummary.textContent = parts.length ? parts.join(", ") : "No pending changes";
    }

    countryFilterSelect.addEventListener("change", () => {
      state.country = countryFilterSelect.value;
      state.hotelState = "";
      state.city = "";
      updateStateFilterOptions();
      updateCityFilterOptions();
      renderHotelList();
    });

    stateFilterSelect.addEventListener("change", () => {
      state.hotelState = stateFilterSelect.value;
      state.city = "";
      updateCityFilterOptions();
      renderHotelList();
    });

    cityFilterSelect.addEventListener("change", () => {
      state.city = cityFilterSelect.value;
      renderHotelList();
    });

    unmappedOnlyToggle.addEventListener("change", renderHotelList);

    searchInput.addEventListener("input", () => {
      state.query = searchInput.value;
      renderHotelList();
    });

    // ---------- Save preview (3 buckets: Previously Saved / New Map / Unmap) ----------
    // No Remap bucket — unlike every other mapping in this project, a hotel
    // isn't limited to one city, so a freshly-checked hotel is always a
    // plain New Map, never a reassignment.

    function previewRowHtml(h) {
      return `
      <div class="merge-list-item">
        <span class="meta">
          <span>${h.name}</span>
          <span class="sub">${hotelMetaSub(h)}</span>
        </span>
      </div>`;
    }

    function previewSectionHtml(title, rows, bodyHtml) {
      return `
      <div class="preview-section">
        <div class="preview-section-title">${title} (${rows.length})</div>
        ${rows.length ? bodyHtml : `<div class="empty-state">None</div>`}
      </div>`;
    }

    function buildHotelPreviewSectionsHtml({ keptRows, newMapRows, removedRows }) {
      return (
        previewSectionHtml("Previously Saved", keptRows, `<div class="merge-list">${keptRows.map(previewRowHtml).join("")}</div>`) +
        previewSectionHtml("New Map", newMapRows, `<div class="merge-list">${newMapRows.map(previewRowHtml).join("")}</div>`) +
        previewSectionHtml("Unmap", removedRows, `<div class="merge-list">${removedRows.map(previewRowHtml).join("")}</div>`)
      );
    }

    let pendingPreviewConfirm = null;

    function openHotelMappingPreview(buckets, onConfirm) {
      document.getElementById("previewSections").innerHTML = buildHotelPreviewSectionsHtml(buckets);
      pendingPreviewConfirm = onConfirm;
      openModal(document.getElementById("hotelMappingPreviewModal"));
    }

    document.getElementById("hotelPreviewConfirmBtn").addEventListener("click", () => {
      const action = pendingPreviewConfirm;
      pendingPreviewConfirm = null;
      closeModal(document.getElementById("hotelMappingPreviewModal"));
      if (action) action();
    });

    document.getElementById("saveHotelMappingBtn").addEventListener("click", () => {
      const addedIds = [...pendingChecked].filter((id) => !initialMappedIds.has(id));
      const removedIds = [...initialMappedIds].filter((id) => !pendingChecked.has(id));
      const keptIds = [...initialMappedIds].filter((id) => pendingChecked.has(id));

      if (!addedIds.length && !removedIds.length) {
        showToast("No changes to save", "error");
        return;
      }

      const addedRows = addedIds.map((id) => SYSTEM_HOTELS.find((h) => h.id === id)).filter(Boolean);
      const removedRows = removedIds.map((id) => SYSTEM_HOTELS.find((h) => h.id === id)).filter(Boolean);
      const keptRows = keptIds.map((id) => SYSTEM_HOTELS.find((h) => h.id === id)).filter(Boolean);

      function doApply() {
        // One shared group id for every hotel this Save touches (always the
        // same pinned city) so its own history can show the whole batch as
        // one grouped card instead of one entry per hotel — same convention
        // as city-mapping.html's own doApply().
        const groupId = generateHistoryGroupId();
        addedRows.forEach((h) => {
          applyHotelCityMap(h, pinnedCity, true, groupId);
          initialMappedIds.add(h.id);
        });
        removedRows.forEach((h) => {
          applyHotelCityMap(h, pinnedCity, false, groupId);
          initialMappedIds.delete(h.id);
        });
        updatePinnedCount();
        renderHotelList();
        renderSelectedHotelsList();
        updateSelectionSummary();

        const parts = [];
        if (addedRows.length) parts.push(`${addedRows.length} mapped`);
        if (removedRows.length) parts.push(`${removedRows.length} unmapped`);
        showToast(parts.join(", "));
      }

      // Always preview before applying, same as city-mapping.html — even a
      // single plain new map still gets the same one consistent confirm step.
      openHotelMappingPreview({ keptRows, newMapRows: addedRows, removedRows }, doApply);
    });

    updatePinnedCount();
    updateStateFilterOptions();
    updateCityFilterOptions();
    renderHotelList();
    renderSelectedHotelsList();
    updateSelectionSummary();
  }
</script>
</body>
</html>
