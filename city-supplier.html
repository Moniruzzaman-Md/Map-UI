<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Supplier City List – Hotel Map | mynztrip.com</title>
<link rel="stylesheet" href="css/styles.css" />
</head>
<body>
<div class="app-shell">

  <!-- Top bar -->
  <header class="topbar">
    <div class="topbar-brand">
      <svg width="26" height="26" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M12 2L2 8l10 4 10-4-10-6z" fill="#fff"/>
        <path d="M2 16l10 4 10-4M2 12l10 4 10-4" stroke="#fff" stroke-width="1.6" fill="none"/>
      </svg>
      mynztrip.com
    </div>

    <button class="icon-btn" aria-label="Menu">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none"><path d="M4 6h16M4 12h16M4 18h16" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
    </button>

    <button class="icon-btn accent-red" aria-label="Messages">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M21 11.5a8.38 8.38 0 01-.9 3.8 8.5 8.5 0 01-7.6 4.7 8.38 8.38 0 01-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 01-.9-3.8 8.5 8.5 0 014.7-7.6 8.38 8.38 0 013.8-.9h.5a8.48 8.48 0 018 8v.5z" stroke="#fff" stroke-width="1.8" fill="none"/></svg>
    </button>

    <div class="topbar-search">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none"><circle cx="11" cy="11" r="7" stroke="currentColor" stroke-width="2"/><path d="M21 21l-4.35-4.35" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
      <input type="text" placeholder="Booking ID, PNR, Ticket No..." />
      <button type="button">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none"><circle cx="11" cy="11" r="7" stroke="#fff" stroke-width="2"/><path d="M21 21l-4.35-4.35" stroke="#fff" stroke-width="2" stroke-linecap="round"/></svg>
        Search
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none"><path d="M6 9l6 6 6-6" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </button>
    </div>

    <div class="topbar-right">
      <button class="icon-btn" aria-label="Notifications">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none"><path d="M18 8a6 6 0 10-12 0c0 7-3 9-3 9h18s-3-2-3-9z" stroke="#fff" stroke-width="1.8" fill="none"/><path d="M13.7 21a2 2 0 01-3.4 0" stroke="#fff" stroke-width="1.8"/></svg>
      </button>
      <svg class="avatar" width="38" height="38" viewBox="0 0 38 38" xmlns="http://www.w3.org/2000/svg">
        <circle cx="19" cy="19" r="19" fill="#c7cbe8"/>
        <circle cx="19" cy="15" r="6" fill="#7c82b0"/>
        <path d="M6 34c1.5-7 8-10 13-10s11.5 3 13 10" fill="#7c82b0"/>
      </svg>
    </div>
  </header>

  <div class="app-body">

    <!-- Sidebar -->
    <aside class="sidebar">
      <!-- Hotel Map (mother menu for this project's pages) -->
      <nav class="nav-group open">
        <button class="nav-item active">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M9 4L4 6v14l5-2 6 2 5-2V4l-5 2-6-2z" stroke="currentColor" stroke-width="1.6" stroke-linejoin="round"/><path d="M9 4v14M15 6v14" stroke="currentColor" stroke-width="1.6"/></svg>
          Hotel Map
          <svg class="chevron" width="14" height="14" viewBox="0 0 24 24" fill="none"><path d="M6 9l6 6 6-6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </button>
        <div class="submenu">
          <div class="submenu-group">
            <button class="submenu-item submenu-toggle">
              Country
              <svg class="chevron" width="14" height="14" viewBox="0 0 24 24" fill="none"><path d="M6 9l6 6 6-6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
            </button>
            <div class="submenu-nested">
              <a class="submenu-item nested" href="country-system.html">System</a>
              <a class="submenu-item nested" href="country-supplier.html">Supplier</a>
            </div>
          </div>
          <div class="submenu-group open">
            <button class="submenu-item submenu-toggle">
              City
              <svg class="chevron" width="14" height="14" viewBox="0 0 24 24" fill="none"><path d="M6 9l6 6 6-6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
            </button>
            <div class="submenu-nested">
              <a class="submenu-item nested" href="city-system.html">System</a>
              <a class="submenu-item nested active" href="city-supplier.html">Supplier</a>
            </div>
          </div>
          <a class="submenu-item" href="city-mapping.html">City Mapping</a>
          <div class="submenu-group">
            <button class="submenu-item submenu-toggle">
              Hotel
              <svg class="chevron" width="14" height="14" viewBox="0 0 24 24" fill="none"><path d="M6 9l6 6 6-6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
            </button>
            <div class="submenu-nested">
              <a class="submenu-item nested" href="hotel-system.html">System</a>
            </div>
          </div>
        </div>
      </nav>

      <div class="sidebar-footer">
        <button class="reset-demo-btn" id="resetDemoDataBtn">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none"><path d="M3 12a9 9 0 109-9 9 9 0 00-7 3.3" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/><path d="M3 3.5V8h4.5" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg>
          Reset Demo Data
        </button>
      </div>
    </aside>

    <!-- Main content -->
    <main class="main-content">
      <div class="page-header">
        <div class="breadcrumb">Hotel Map <span class="sep">/</span> City <span class="sep">/</span> Supplier</div>
        <div class="page-title-row">
          <h1 class="page-title">Supplier City List</h1>
          <button class="info-icon-btn" data-info-target="#supplierCityInfo" data-info-title="Supplier City List" aria-label="About this page">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="9" stroke="currentColor" stroke-width="1.6"/><path d="M12 11v5" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/><circle cx="12" cy="8" r="1" fill="currentColor"/></svg>
          </button>
        </div>
      </div>
      <hr class="page-divider" />

      <template id="supplierCityInfo">
        <p>This page maps each <strong>supplier's own city list</strong> to the system's master city list, so bookings from different suppliers can be matched to the same city record.</p>
        <ul>
          <li><strong>ID</strong> — this supplier's own identifier for the city, not editable.</li>
          <li><strong>Map</strong> — go to City Mapping with this supplier city already pre-selected on the right, ready to pin a system city and save.</li>
          <li><strong>Unmap</strong> — appears once a city is mapped; opens a confirmation before clearing the mapping.</li>
          <li><strong>History</strong> — view every mapping made, changed, or removed, by whom and when.</li>
          <li><strong>Active/Inactive toggle</strong> — controls whether this supplier city is available for booking. Changes immediately, no confirmation needed, and is logged to History. Filter the list by status with the <strong>Status</strong> dropdown.</li>
        </ul>
      </template>

      <section class="content-card">
        <div class="card-toolbar">
          <h2>Cities</h2>
          <div class="toolbar-controls">
            <div class="toolbar-search">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none"><circle cx="11" cy="11" r="7" stroke="currentColor" stroke-width="2"/><path d="M21 21l-4.35-4.35" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
              <input type="text" id="citySearch" placeholder="Search by city name..." disabled />
            </div>
            <div class="toolbar-filters">
              <select class="filter-select" id="supplierFilter">
                <option value="">Select Supplier</option>
              </select>
              <select class="filter-select" id="countryFilter" disabled>
                <option value="">All Countries</option>
              </select>
              <select class="filter-select" id="mappedFilter" disabled>
                <option value="all">All</option>
                <option value="mapped">Mapped</option>
                <option value="unmapped">Unmapped</option>
              </select>
              <select class="filter-select" id="statusFilter" disabled>
                <option value="all">All Status</option>
                <option value="active">Active</option>
                <option value="inactive">Inactive</option>
              </select>
            </div>
          </div>
        </div>

        <div class="table-wrap">
          <table class="data-table" id="supplierCityTable">
            <thead>
              <tr>
                <th style="width:10%">ID</th>
                <th style="width:14%">Name</th>
                <th style="width:11%">State</th>
                <th style="width:15%">Country</th>
                <th style="width:22%">System City</th>
                <th style="width:9%">Status</th>
                <th style="width:19%">Action</th>
              </tr>
            </thead>
            <tbody>
              <tr>
                <td colspan="7" class="empty-state">Select a supplier to view its city list</td>
              </tr>
            </tbody>
          </table>
        </div>

        <div class="table-footer pagination-bar" id="paginationBar"></div>
      </section>
    </main>
  </div>
</div>

<!-- Mapping History Modal (card design) -->
<div class="modal-overlay" id="historyModal">
  <div class="modal">
    <div class="modal-header">
      <h3>Mapping History <span id="historyCityName" style="color:var(--text-muted); font-weight:600;"></span></h3>
      <button class="modal-close" data-modal-close aria-label="Close">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none"><path d="M6 6l12 12M18 6L6 18" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
      </button>
    </div>
    <div class="modal-body">
      <div class="history-list" id="historyList"></div>
    </div>
  </div>
</div>

<!-- Confirm Dialog: intentional exception to the sliding-drawer modal
     convention — this is a real centered popup (fade + scale in place),
     since a confirm/warning prompt reads better centered than as a drawer.
     Mirrors the same #confirmModal pattern used in city-mapping.html. -->
<div class="modal-overlay popup-overlay" id="confirmModal">
  <div class="popup-box">
    <div class="modal-header">
      <h3>Please Confirm</h3>
      <button class="modal-close" data-modal-close aria-label="Close">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none"><path d="M6 6l12 12M18 6L6 18" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
      </button>
    </div>
    <div class="modal-body">
      <div id="confirmMessage"></div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" data-modal-close>Cancel</button>
      <button class="btn btn-primary" id="confirmActionBtn">Continue</button>
    </div>
  </div>
</div>

<script src="js/app.js"></script>
<script src="js/data.js"></script>
<script>
  const tbody = document.querySelector("#supplierCityTable tbody");
  const paginationBar = document.getElementById("paginationBar");
  const supplierFilter = document.getElementById("supplierFilter");
  supplierFilter.insertAdjacentHTML(
    "beforeend",
    Object.keys(SUPPLIER_LABELS)
      .map((key) => `<option value="${key}">${SUPPLIER_LABELS[key]}</option>`)
      .join("")
  );
  const countryFilter = document.getElementById("countryFilter");
  const mappedFilter = document.getElementById("mappedFilter");
  const statusFilter = document.getElementById("statusFilter");
  const citySearch = document.getElementById("citySearch");

  let state = { page: 1, pageSize: 10, supplier: "", country: "", mapped: "all", status: "all", query: "" };

  function currentRows() {
    return supplierCities[state.supplier] || [];
  }

  function getFiltered() {
    if (!state.supplier) return [];
    let rows = currentRows();
    if (state.country) rows = rows.filter((r) => r.countryCode === state.country);
    if (state.mapped === "mapped") rows = rows.filter((r) => r.systemCityId !== null);
    if (state.mapped === "unmapped") rows = rows.filter((r) => r.systemCityId === null);
    if (state.status === "active") rows = rows.filter((r) => r.active);
    if (state.status === "inactive") rows = rows.filter((r) => !r.active);
    const q = state.query.trim().toLowerCase();
    if (q) rows = rows.filter((r) => r.name.toLowerCase().includes(q));
    return rows;
  }

  function render() {
    if (!state.supplier) {
      tbody.innerHTML = `<tr><td colspan="5" class="empty-state">Select a supplier to view its city list</td></tr>`;
      paginationBar.innerHTML = "";
      return;
    }

    const filtered = getFiltered();
    const totalPages = Math.max(1, Math.ceil(filtered.length / state.pageSize));
    state.page = Math.min(state.page, totalPages);
    const startIdx = (state.page - 1) * state.pageSize;
    const pageItems = filtered.slice(startIdx, startIdx + state.pageSize);

    tbody.innerHTML = pageItems.length
      ? pageItems
          .map((r) => {
            const systemCity = r.systemCityId !== null ? SYSTEM_CITIES.find((c) => c.id === r.systemCityId) : null;
            const systemCityCell = systemCity
              ? `<div style="font-weight:600;">${systemCity.name}</div>
                 <div style="font-size:12px; color:var(--text-muted); margin-top:2px;">${getSystemCityLabel(systemCity.id)}</div>`
              : '<span class="text-not-mapped">Not mapped</span>';
            return `
      <tr>
        <td>${r.id}</td>
        <td>${r.name}</td>
        <td>${r.state ? r.state : '<span style="color:var(--text-muted)">—</span>'}</td>
        <td>${getSupplierCountryName(state.supplier, r.countryCode)} <span class="code-badge">${r.countryCode}</span></td>
        <td>${systemCityCell}</td>
        <td><span class="pill ${r.active ? "success" : "danger"}">${r.active ? "Active" : "Inactive"}</span></td>
        <td>
          <div class="row-actions">
            <button class="action-btn" data-map-btn data-row-id="${r.id}" aria-label="Map ${r.name}">
              <svg width="15" height="15" viewBox="0 0 24 24" fill="none"><path d="M9 17l-4.5 2V7L9 5m0 12l6 2m-6-2V5m6 14l4.5-2V5L15 7m0 12V7m0 0L9 5" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/></svg>
            </button>
            <button class="action-btn" data-history-btn data-row-id="${r.id}" aria-label="View mapping history for ${r.name}">
              <svg width="15" height="15" viewBox="0 0 24 24" fill="none"><path d="M3 12a9 9 0 109-9 9 9 0 00-7 3.3" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/><path d="M3 3.5V8h4.5" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/><path d="M12 7.5V12l3.2 2" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg>
            </button>
            ${
              r.systemCityId !== null
                ? `<button class="action-btn" data-unmap-btn data-row-id="${r.id}" aria-label="Unmap ${r.name}">
              <svg width="15" height="15" viewBox="0 0 24 24" fill="none"><path d="M6 6l12 12M18 6L6 18" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>
            </button>`
                : ""
            }
            <button class="action-btn" data-toggle-active-btn data-row-id="${r.id}" aria-label="${r.active ? "Deactivate" : "Activate"} ${r.name}">
              <svg width="15" height="15" viewBox="0 0 24 24" fill="none"><path d="M12 2v10" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/><path d="M6 5a8 8 0 106.5-1.5" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/></svg>
            </button>
          </div>
        </td>
      </tr>`;
          })
          .join("")
      : `<tr><td colspan="7" class="empty-state">No cities match this filter</td></tr>`;

    renderPagination(paginationBar, {
      total: filtered.length,
      page: state.page,
      pageSize: state.pageSize,
      onChange: ({ page, pageSize }) => {
        state.page = page;
        state.pageSize = pageSize;
        render();
      },
    });
  }

  supplierFilter.addEventListener("change", () => {
    state.supplier = supplierFilter.value;
    state.page = 1;
    mappedFilter.disabled = !state.supplier;
    statusFilter.disabled = !state.supplier;
    countryFilter.disabled = !state.supplier;
    citySearch.disabled = !state.supplier;
    state.country = "";

    if (state.supplier) {
      const codes = [...new Set(currentRows().map((r) => r.countryCode))];
      countryFilter.innerHTML =
        `<option value="">All Countries</option>` +
        codes
          .map((code) => `<option value="${code}">${getSupplierCountryName(state.supplier, code)}</option>`)
          .join("");
    } else {
      countryFilter.innerHTML = `<option value="">All Countries</option>`;
      state.query = "";
      citySearch.value = "";
      mappedFilter.value = "all";
      state.mapped = "all";
      statusFilter.value = "all";
      state.status = "all";
    }
    render();
  });

  countryFilter.addEventListener("change", () => {
    state.country = countryFilter.value;
    state.page = 1;
    render();
  });

  mappedFilter.addEventListener("change", () => {
    state.mapped = mappedFilter.value;
    state.page = 1;
    render();
  });

  statusFilter.addEventListener("change", () => {
    state.status = statusFilter.value;
    state.page = 1;
    render();
  });

  const runSearch = debounce(() => {
    state.query = citySearch.value;
    state.page = 1;
    render();
  });
  citySearch.addEventListener("input", runSearch);

  document.addEventListener("click", (e) => {
    const mapBtn = e.target.closest("[data-map-btn]");
    if (mapBtn) {
      const row = currentRows().find((r) => String(r.id) === mapBtn.dataset.rowId);
      if (!row) return;
      const params = new URLSearchParams({ supplier: state.supplier, country: row.countryCode, supplierCityId: String(row.id) });
      if (row.state) params.set("state", row.state);
      location.href = `city-mapping.html?${params.toString()}`;
      return;
    }

    const historyBtn = e.target.closest("[data-history-btn]");
    if (historyBtn) {
      const record = currentRows().find((r) => String(r.id) === historyBtn.dataset.rowId);
      if (!record) return;
      const supplierLabel = SUPPLIER_LABELS[state.supplier] || state.supplier;
      document.getElementById("historyCityName").textContent = `— ${supplierLabel} / ${record.name} (ID: ${record.id})`;
      document.getElementById("historyList").innerHTML = renderHistoryList(record.history, "No mapping history yet");
      openModal(document.getElementById("historyModal"));
      return;
    }

    const unmapBtn = e.target.closest("[data-unmap-btn]");
    if (unmapBtn) {
      const record = currentRows().find((r) => String(r.id) === unmapBtn.dataset.rowId);
      if (!record) return;
      showConfirm(
        `<p style="margin:0;">Unmap <strong>${record.name}</strong> from <strong>${getSystemCityLabel(record.systemCityId)}</strong>?</p>`,
        () => {
          applyMapping(state.supplier, record, null);
          showToast(`${record.name} unmapped`);
          render();
        }
      );
      return;
    }

    const toggleBtn = e.target.closest("[data-toggle-active-btn]");
    if (toggleBtn) {
      const record = currentRows().find((r) => String(r.id) === toggleBtn.dataset.rowId);
      if (!record) return;
      const wasActive = record.active;
      record.active = !record.active;
      record.history.push({
        operation: "Status Change",
        status: record.active,
        description: `Status: ${wasActive ? "Active" : "Inactive"} -> ${record.active ? "Active" : "Inactive"}`,
        userName: CURRENT_USER.name,
        userEmail: CURRENT_USER.email,
        timestamp: new Date(),
      });
      saveToStorage("supplierCities", supplierCities);
      render();
      showToast(`${record.name} marked ${record.active ? "Active" : "Inactive"}`);
    }
  });

  // ---------- Confirm dialog (generic, mirrors city-mapping.html) ----------

  let pendingConfirmAction = null;

  function showConfirm(html, onConfirm) {
    document.getElementById("confirmMessage").innerHTML = html;
    pendingConfirmAction = onConfirm;
    openModal(document.getElementById("confirmModal"));
  }

  document.getElementById("confirmActionBtn").addEventListener("click", () => {
    const action = pendingConfirmAction;
    pendingConfirmAction = null;
    closeModal(document.getElementById("confirmModal"));
    if (action) action();
  });

  // Pre-select supplier/country when arriving from a deep link, e.g.
  // city-supplier.html?supplier=agoda&country=US (used by the "View Cities"
  // action on the Supplier Country List page).
  const urlParams = new URLSearchParams(location.search);
  const linkedSupplier = urlParams.get("supplier");
  const linkedCountry = urlParams.get("country");

  if (linkedSupplier && supplierFilter.querySelector(`option[value="${linkedSupplier}"]`)) {
    supplierFilter.value = linkedSupplier;
    supplierFilter.dispatchEvent(new Event("change"));

    if (linkedCountry) {
      // The dropdown only lists countries that already have city rows for
      // this supplier, but the deep link can point at one that has none yet
      // (e.g. not mapped in supplierCities). Add it so the filter still
      // narrows to that country instead of silently falling back to all.
      if (!countryFilter.querySelector(`option[value="${linkedCountry}"]`)) {
        countryFilter.insertAdjacentHTML(
          "beforeend",
          `<option value="${linkedCountry}">${getSupplierCountryName(linkedSupplier, linkedCountry)}</option>`
        );
      }
      countryFilter.value = linkedCountry;
      countryFilter.dispatchEvent(new Event("change"));
    }
  }

  render();
</script>
</body>
</html>
